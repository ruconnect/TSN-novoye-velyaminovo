<!DOCTYPE html>
<html lang="ru">
<head>
    <!-- Сам плеер с сиреной (скрыт через display: none) -->
<audio id="siren" src="siren.mp3" loop></audio>

<script>
    // Ждем первого клика пользователя, чтобы обойти блокировку браузера
    document.addEventListener('click', function initSiren() {
        var siren = document.getElementById('siren');
        
        // Включаем сирену
        siren.play().catch(function(error) {
            console.log("Автовоспроизведение заблокировано браузером", error);
        });

        // Удаляем слушатель, чтобы сирена не перезапускалась при следующих кликах
        document.removeEventListener('click', initSiren);
    });
</script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error</title>
    <style>
        /* Стили для всей страницы */
        body {
            margin: 0;
            padding: 0;
            background-color: black; /* Чёрный фон страницы */
            height: 100vh; /* Высота во весь экран */
            display: flex;
            justify-content: center; /* Центрирование по горизонтали */
            align-items: center; /* Центрирование по вертикали */
            font-family: sans-serif;
        }

        /* Стили для квадрата */
        .square {
            width: 200px; /* Ширина квадрата */
            height: 200px; /* Высота квадрата */
            background-color: black; /* Цвет самого квадрата (можно изменить) */
            color: red; /* Красный цвет текста */
            display: flex;
            justify-content: center; /* Текст по центру квадрата (горизонтально) */
            align-items: center; /* Текст по центру квадрата (вертикально) */
            text-align: center;
            font-weight: bold;
            box-sizing: border-box;
            padding: 10px;
        }
    </style>
</head>
<body>

    <div class="square">
        Беспилотная опасность!
    </div>

</body>
</html>
