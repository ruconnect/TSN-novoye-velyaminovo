<!DOCTYPE html>
<html>
<head>
    <p>Игра от Floppa game</p>
    <button onclick="window.location.href='snake.html';">Новая игра змейка</button>
    <title>Змейка буквами</title>
    <style>
        /* Минимальные стили для корректного отображения */
        body {
            font-family: monospace;
            margin: 20px;
        }
        #game-container {
            white-space: pre;
            font-size: 16px;
            line-height: 1;
        }
    </style>
</head>
<body>
    <h1>Змейка (буквами)</h1>
    <div id="game-info">
        Счёт: <span id="score">0</span> |
        Длина: <span id="length">3</span>
    </div>
    <div id="game-container"></div>
    <script>
        // Настройки игры
        const WIDTH = 20;
        const HEIGHT = 15;
        let score = 0;
        let snake = [];
        let food = {};
        let direction = 'right';
        let gameInterval;
        let isGameOver = false;

        // Инициализация игры
        function initGame() {
            // Создаём змею (начальная позиция)
            snake = [
                {x: 5, y: 7},
                {x: 4, y: 7},
                {x: 3, y: 7}
            ];

            // Создаём еду
            createFood();

            // Запускаем игровой цикл
            gameInterval = setInterval(gameLoop, 200);

            // Обработчики клавиш
            document.addEventListener('keydown', handleKeyPress);
        }

        // Создание еды в случайном месте
        function createFood() {
            food = {
                x: Math.floor(Math.random() * WIDTH),
                y: Math.floor(Math.random() * HEIGHT)
            };

            // Проверяем, что еда не появилась на змее
            for (let part of snake) {
                if (food.x === part.x && food.y === part.y) {
                    createFood(); // Пересоздаём
                    return;
                }
            }
        }

        // Обработка нажатий клавиш
        function handleKeyPress(e) {
            if (isGameOver) return;

            switch (e.key) {
                case 'ArrowUp':
                    if (direction !== 'down') direction = 'up';
                    break;
                case 'ArrowDown':
                    if (direction !== 'up') direction = 'down';
                    break;
                case 'ArrowLeft':
                    if (direction !== 'right') direction = 'left';
                    break;
                case 'ArrowRight':
                    if (direction !== 'left') direction = 'right';
                    break;
            }
        }

        // Основной игровой цикл
        function gameLoop() {
            if (isGameOver) return;

            // Двигаем змею
            const head = {...snake[0]};

            switch (direction) {
                case 'up': head.y--; break;
                case 'down': head.y++; break;
                case 'left': head.x--; break;
                case 'right': head.x++; break;
            }

            // Проверка столкновения со стеной
            if (head.x < 0 || head.x >= WIDTH || head.y < 0 || head.y >= HEIGHT) {
                gameOver();
                return;
            }

            // Проверка столкновения с собой
            for (let part of snake) {
                if (head.x === part.x && head.y === part.y) {
                    gameOver();
                    return;
                }
            }

            // Добавляем новую голову
            snake.unshift(head);

            // Проверка поедания еды
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('score').textContent = score;
                document.getElementById('length').textContent = snake.length;
                createFood();
            } else {
                // Удаляем хвост, если не съели еду
                snake.pop();
            }

            // Отрисовываем поле
            drawField();
        }

        // Отрисовка игрового поля
        function drawField() {
            let field = '';

            for (let y = 0; y < HEIGHT; y++) {
                for (let x = 0; x < WIDTH; x++) {
                    let symbol = '·'; // Пустое место

                    // Рисуем змею
                    for (let i = 0; i < snake.length; i++) {
                        if (snake[i].x === x && snake[i].y === y) {
                            if (i === 0) {
                                symbol = '@'; // Голова змеи
                            } else {
                                symbol = 'O'; // Тело змеи
                            }
                            break;
                        }
                    }

                    // Рисуем еду
                    if (food.x === x && food.y === y) {
                symbol = '*';
            }

            field += symbol;
        }
        field += '\n'; // Переход на новую строку
    }

    document.getElementById('game-container').textContent = field;
}

// Конец игры
function gameOver() {
    isGameOver = true;
    clearInterval(gameInterval);
    document.getElementById('game-container').textContent += '\n=== ИГРА ОКОНЧЕНА ===\nНаберите F5 для перезапуска';
}

// Запускаем игру при загрузке страницы
window.onload = initGame;
</script>
</body>
</html>
