<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Профиль пользователя</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="profile">

    <section class="profile-card">
      <div class="avatar">
        И
      </div>

      <div class="profile-info">
        <h1>Саша Ивлиев</h1>
        <p class="status"></p>
        <p class="description">
          Любит активность
        </p>
      </div>
    </section>

    <section class="achievements-section">
      <h2>Достижения</h2>

      <!--
        Чтобы добавить новое достижение:
        1. Скопируй блок achievement.
        2. Измени название, описание и дату.
        3. Укажи нужный тип достижения:

        highest  — Высшей пробы, синий цвет
        gold     — Золото
        silver   — Серебро
        bronze   — Бронза
      -->

      <div class="achievements-list">

        <article class="achievement bronze">
          <div class="achievement-header">
            <h3>Бронза</h3>
            <span class="achievement-date">ЛОБАНОВО</span>
          </div>
          <p>
            Первый приезд в Новое Вельяминово
          </p>
          
        </article>
        <article class="achievement sliver">
          <div class="achievement-header">
            <h3>Серебро</h3>
            <span class="achievement-date">ЛОБАНОВО</span>
          </div>
          <p>
            Первая ночь в Вельяминово
          </p>
        </article>
        <article class="achievement sliver">
          <div class="achievement-header">
            <h3>Серебро</h3>
            <span class="achievement-date">ЛОБАНОВО</span>
          </div>
          <p>
            Своя комната
          </p>
        </article>

      </div>
    </section>

  </main>

</body>
</html>
