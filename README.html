<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>README</title>
    <!-- Стабильный CDN для стилей -->
    <link rel="stylesheet" href="https://yastatic.net">
    <style>
        body { max-width: 800px; margin: 0 auto; padding: 20px; font-family: sans-serif; }
    </style>
</head>
<body>

    <article id="content" class="markdown-body">
        Загрузка содержимого...
    </article>

    <!-- ИССПРАВЛЕНИЕ 1: Используем Яндекс CDN, который не выдаст TIMED_OUT -->
    <script src="https://yastatic.net"></script>

    <script>
        // ИСПРАВЛЕНИЕ 2: Убедитесь, что тут написано ТОЧНОЕ имя вашего файла!
        // Если у вас файл называется README.md, замените 'document.md' на 'README.md'
        const fileUrl = 'README.md'; 

        fetch(fileUrl)
            .then(response => {
                if (!response.ok) {
                    throw new Error(`Файл не найден. Сервер вернул статус: ${response.status}`);
                }
                return response.text();
            })
            .then(markdownText => {
                document.getElementById('content').innerHTML = marked.parse(markdownText);
            })
            .catch(error => {
                document.getElementById('content').innerHTML = `<p style="color: red;">Ошибка: ${error.message}</p>`;
                console.error(error);
            });
    </script>

</body>
</html>
