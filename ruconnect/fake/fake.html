<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Конструктор переписок</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      color: #111827;
    }

    .app {
      display: grid;
      grid-template-columns: 360px 1fr;
      min-height: 100vh;
    }

    .panel {
      background: #ffffff;
      border-right: 1px solid #d1d5db;
      padding: 24px;
    }

    .panel h1 {
      font-size: 20px;
      margin: 0 0 24px;
      font-weight: 600;
    }

    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 13px;
      color: #374151;
      margin-bottom: 6px;
      font-weight: 600;
    }

    input,
    textarea,
    select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #cbd5e1;
      border-radius: 4px;
      font-size: 14px;
      outline: none;
      background: #ffffff;
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: #111827;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 20px;
    }

    button {
      padding: 11px 14px;
      border: none;
      border-radius: 4px;
      background: #111827;
      color: #ffffff;
      font-size: 14px;
      cursor: pointer;
      font-weight: 600;
    }

    button:hover {
      background: #1f2937;
    }

    button.secondary {
      background: #e5e7eb;
      color: #111827;
    }

    button.secondary:hover {
      background: #d1d5db;
    }

    button.danger {
      background: #991b1b;
    }

    button.danger:hover {
      background: #7f1d1d;
    }

    .preview-wrap {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 32px;
      overflow: auto;
    }

    .phone {
      width: 390px;
      background: #ffffff;
      border: 1px solid #9ca3af;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
    }

    .chat-header {
      padding: 16px;
      border-bottom: 1px solid #d1d5db;
      background: #ffffff;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: #111827;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 16px;
      flex-shrink: 0;
    }

    .chat-info {
      overflow: hidden;
    }

    .chat-name {
      font-size: 15px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-status {
      margin-top: 3px;
      font-size: 12px;
      color: #6b7280;
    }

    .chat-body {
      min-height: 520px;
      padding: 18px;
      background: #f9fafb;
    }

    .date-line {
      text-align: center;
      font-size: 12px;
      color: #6b7280;
      margin: 10px 0 18px;
    }

    .message {
      max-width: 78%;
      margin-bottom: 12px;
      padding: 10px 12px;
      border-radius: 6px;
      font-size: 14px;
      line-height: 1.4;
      border: 1px solid #d1d5db;
      position: relative;
      word-wrap: break-word;
      white-space: pre-wrap;
    }

    .message.left {
      background: #ffffff;
      color: #111827;
      margin-right: auto;
    }

    .message.right {
      background: #111827;
      color: #ffffff;
      margin-left: auto;
      border-color: #111827;
    }

    .meta {
      display: block;
      margin-top: 6px;
      font-size: 11px;
      opacity: 0.72;
      text-align: right;
    }

    .empty {
      color: #6b7280;
      text-align: center;
      font-size: 14px;
      margin-top: 180px;
    }

    .messages-list {
      margin-top: 24px;
      border-top: 1px solid #e5e7eb;
      padding-top: 16px;
    }

    .messages-list h2 {
      font-size: 15px;
      margin: 0 0 12px;
    }

    .message-item {
      padding: 10px;
      border: 1px solid #e5e7eb;
      border-radius: 4px;
      margin-bottom: 8px;
      font-size: 13px;
      cursor: pointer;
      background: #fafafa;
    }

    .message-item:hover {
      background: #f3f4f6;
    }

    .message-item strong {
      display: block;
      margin-bottom: 4px;
    }

    @media (max-width: 850px) {
      .app {
        grid-template-columns: 1fr;
      }

      .panel {
        border-right: none;
        border-bottom: 1px solid #d1d5db;
      }

      .preview-wrap {
        padding: 20px;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <aside class="panel">
      <h1>Конструктор переписки</h1>

      <div class="field">
        <label for="chatName">Имя собеседника</label>
        <input id="chatName" type="text" value="Александр Иванов" />
      </div>

      <div class="field">
        <label for="chatStatus">Статус</label>
        <input id="chatStatus" type="text" value="был(а) недавно" />
      </div>

      <div class="field">
        <label for="chatDate">Дата в переписке</label>
        <input id="chatDate" type="text" value="Сегодня" />
      </div>

      <div class="field">
        <label for="messageAuthor">Сторона сообщения</label>
        <select id="messageAuthor">
          <option value="left">Собеседник</option>
          <option value="right">Вы</option>
        </select>
      </div>

      <div class="field">
        <label for="messageText">Текст сообщения</label>
        <textarea id="messageText" placeholder="Введите текст сообщения"></textarea>
      </div>

      <div class="row">
        <div class="field">
          <label for="messageTime">Время</label>
          <input id="messageTime" type="text" value="12:30" />
        </div>

        <div class="field">
          <label for="messageStatus">Статус</label>
          <select id="messageStatus">
            <option value="">Без статуса</option>
            <option value="✓">✓</option>
            <option value="✓✓">✓✓</option>
          </select>
        </div>
      </div>

      <div class="buttons">
        <button onclick="addMessage()">Добавить сообщение</button>
        <button class="secondary" onclick="downloadHTML()">Скачать HTML</button>
        <button class="secondary" onclick="downloadImage()">Скачать как изображение</button>
        <button class="danger" onclick="clearMessages()">Очистить переписку</button>
      </div>

      <div class="messages-list">
        <h2>Сообщения</h2>
        <div id="messagesList"></div>
      </div>
    </aside>

    <main class="preview-wrap">
      <section class="phone" id="chatPreview">
        <header class="chat-header">
          <div class="avatar" id="avatar">АИ</div>

          <div class="chat-info">
            <div class="chat-name" id="previewName">Александр Иванов</div>
            <div class="chat-status" id="previewStatus">был(а) недавно</div>
          </div>
        </header>

        <div class="chat-body" id="chatBody">
          <div class="date-line" id="previewDate">Сегодня</div>
          <div class="empty" id="emptyText">Добавьте первое сообщение</div>
        </div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <script>
    const chatName = document.getElementById("chatName");
    const chatStatus = document.getElementById("chatStatus");
    const chatDate = document.getElementById("chatDate");
    const messageAuthor = document.getElementById("messageAuthor");
    const messageText = document.getElementById("messageText");
    const messageTime = document.getElementById("messageTime");
    const messageStatus = document.getElementById("messageStatus");

    const previewName = document.getElementById("previewName");
    const previewStatus = document.getElementById("previewStatus");
    const previewDate = document.getElementById("previewDate");
    const avatar = document.getElementById("avatar");
    const chatBody = document.getElementById("chatBody");
    const emptyText = document.getElementById("emptyText");
    const messagesList = document.getElementById("messagesList");

    let messages = [];

    function updateHeader() {
      previewName.textContent = chatName.value || "Без имени";
      previewStatus.textContent = chatStatus.value || "";
      previewDate.textContent = chatDate.value || "";

      const words = chatName.value.trim().split(/\s+/);
      let initials = "";

      if (words.length >= 2) {
        initials = words[0][0] + words[1][0];
      } else if (words.length === 1 && words[0]) {
        initials = words[0].slice(0, 2);
      } else {
        initials = "??";
      }

      avatar.textContent = initials.toUpperCase();
    }

    function addMessage() {
      const text = messageText.value.trim();

      if (!text) {
        alert("Введите текст сообщения");
        return;
      }

      messages.push({
        author: messageAuthor.value,
        text: text,
        time: messageTime.value || "",
        status: messageStatus.value || ""
      });

      messageText.value = "";
      renderMessages();
    }

    function renderMessages() {
      chatBody.innerHTML = "";

      const date = document.createElement("div");
      date.className = "date-line";
      date.id = "previewDate";
      date.textContent = chatDate.value || "";
      chatBody.appendChild(date);

      if (messages.length === 0) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.id = "emptyText";
        empty.textContent = "Добавьте первое сообщение";
        chatBody.appendChild(empty);
      }

      messages.forEach((msg) => {
        const message = document.createElement("div");
        message.className = "message " + msg.author;

        const text = document.createElement("div");
        text.textContent = msg.text;

        const meta = document.createElement("span");
        meta.className = "meta";
        meta.textContent = [msg.time, msg.status].filter(Boolean).join(" ");

        message.appendChild(text);
        message.appendChild(meta);
        chatBody.appendChild(message);
      });

      renderMessagesList();
    }

    function renderMessagesList() {
      messagesList.innerHTML = "";

      if (messages.length === 0) {
        messagesList.innerHTML = "<div style='font-size:13px;color:#6b7280;'>Нет сообщений</div>";
        return;
      }

      messages.forEach((msg, index) => {
        const item = document.createElement("div");
        item.className = "message-item";

        const side = msg.author === "left" ? "Собеседник" : "Вы";
        item.innerHTML = `
          <strong>${index + 1}. ${side} — ${msg.time}</strong>
          <span>${escapeHTML(msg.text.slice(0, 60))}${msg.text.length > 60 ? "..." : ""}</span>
        `;

        item.onclick = () => deleteMessage(index);
        messagesList.appendChild(item);
      });
    }

    function deleteMessage(index) {
      const ok = confirm("Удалить это сообщение?");
      if (!ok) return;

      messages.splice(index, 1);
      renderMessages();
    }

    function clearMessages() {
      const ok = confirm("Очистить всю переписку?");
      if (!ok) return;

      messages = [];
      renderMessages();
    }

    function escapeHTML(str) {
      return str.replace(/[&<>"']/g, function(char) {
        return {
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#039;"
        }[char];
      });
    }

    async function downloadImage() {
      const chatPreview = document.getElementById("chatPreview");

      const canvas = await html2canvas(chatPreview, {
        backgroundColor: "#ffffff",
        scale: 2
      });

      const link = document.createElement("a");
      link.download = "fake-chat.png";
      link.href = canvas.toDataURL("image/png");
      link.click();
    }

    function downloadHTML() {
      const html = `
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Переписка</title>
<style>
body {
  margin: 0;
  padding: 30px;
  font-family: Arial, sans-serif;
  background: #f3f4f6;
}

  width: 390px;
  margin: 0 auto;
  background: #ffffff;
  border: 1px solid #9ca3af;
  border-radius: 8px;
  overflow: hidden;
}
.chat-header {
  padding: 16px;
  border-bottom: 1px solid #d1d5db;
  display: flex;
  gap: 12px;
  align-items: center;
}
.avatar {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  background: #111827;
  color: #ffffff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
}
.chat-name {
  font-size: 15px;
  font-weight: 700;
}
.chat-status {
  margin-top: 3px;
  font-size: 12px;
  color: #6b7280;
}
.chat-body {
  min-height: 520px;
  padding: 18px;
  background: #f9fafb;
}
.date-line {
  text-align: center;
  font-size: 12px;
  color: #6b7280;
  margin: 10px 0 18px;
}
.message {
  max-width: 78%;
  margin-bottom: 12px;
  padding: 10px 12px;
  border-radius: 6px;
  font-size: 14px;
  line-height: 1.4;
  border: 1px solid #d1d5db;
  white-space: pre-wrap;
  word-wrap: break-word;
}
.message.left {
  background: #ffffff;
  color: #111827;
  margin-right: auto;
}
.message.right {
  background: #111827;
  color: #ffffff;
  margin-left: auto;
  border-color: #111827;
}
.meta {
  display: block;
  margin-top: 6px;
  font-size: 11px;
  opacity: 0.72;
  text-align: right;
}
</style>
</head>
<body>
${document.getElementById("chatPreview").outerHTML}
</body>
</html>
      `.trim();

      const blob = new Blob([html], { type: "text/html;charset=utf-8" });
      const url = URL.createObjectURL(blob);

      const link = document.createElement("a");
      link.href = url;
      link.download = "fake-chat.html";
      link.click();

      URL.revokeObjectURL(url);
    }

    chatName.addEventListener("input", updateHeader);
    chatStatus.addEventListener("input", updateHeader);
    chatDate.addEventListener("input", renderMessages);

    updateHeader();
    renderMessages();
  </script>
</body>
</html>
