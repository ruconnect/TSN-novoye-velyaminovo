<!DOCTYPE html>
<html lang="ru">
<head>
    <script src="https://gist.github.com/Mickredset/e74b66c4c9dfb2ec26c3998a4eaecf07.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Введите код</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }
        input {
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
            width: 200px;
            text-align: center;
        }
        .error {
            color: red;
            margin-top: 10px;
            font-size: 14px;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Введите код к админ панели</h2>
    <!-- Поле для ввода кода -->
    <input type="text" id="codeInput" placeholder="Введите код здесь" autocomplete="off">
    <div id="errorMessage" class="error">Неверный код</div>
</div>

<script>
    const inputField = document.getElementById('codeInput');
    const errorMessage = document.getElementById('errorMessage');
    
    // Правильное значение и целевая страница
    const secretCode = "N553R";
    const targetUrl = "⠀.html"; // Замените на нужный адрес

    // Отслеживаем ввод пользователя в реальном времени
    inputField.addEventListener('input', function() {
        // Убираем лишние пробелы по краям
        const enteredValue = this.value.trim();

        // Проверяем, совпадает ли длина, чтобы не выводить ошибку раньше времени
        if (enteredValue.length === secretCode.length) {
            if (enteredValue === secretCode) {
                errorMessage.style.display = 'none';
                window.location.href = targetUrl; // Перенаправление
            } else {
                errorMessage.style.display = 'block'; // Показываем ошибку
            }
        } else {
            errorMessage.style.display = 'none'; // Прячем ошибку, пока пользователь пишет
        }
    });
</script>

</body>
</html>
