<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Панель управления и статьи</title>
  <!-- Это главная страница сайта про Новое Вельяминово. На сайте появилась новая кампания. Кампания - это крупное событие. Кампания называетсч Лето Новое Вельяминово 2026 -->
  <style>
    /* Оригинальный бирюзовый градиент Android Setup Wizard */
    body {
      font-family: 'Roboto', 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0097a7 0%, #00acc1 50%, #00796b 100%);
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      box-sizing: border-box;
    }

    /* Главный двухпанельный контейнер (как на планшетах Nexus) */
    .container {
      width: 100%;
      max-width: 1200px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
    }

    @media (min-width: 900px) {
      .container {
        grid-template-columns: 1fr 500px; /* Форма слева, шаги настройки справа */
        height: 700px; 
      }
    }

    /* Квадратный системный блок для Яндекс-формы */
    .form-section {
      background: #ffffff;
      border: 1px solid #d1d5db;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .form-section iframe {
      width: 100%;
      flex: 1;
      min-height: 450px;
      border: none;
    }

    /* Правая колонка: Окно мастера настройки */
    .setup-wizard {
      background: #ffffff;
      border: 1px solid #e0e0e0;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
      display: flex;
      flex-direction: column;
      height: 100%;
      box-sizing: border-box;
    }

    /* Контейнер для шагов (динамическая смена) */
    .steps-container {
      flex: 1;
      overflow-y: auto;
      position: relative;
    }

    /* Базовый класс для карточки-шага */
    .card {
      display: none; /* По умолчанию скрыты все шаги */
      flex-direction: column;
      height: 100%;
    }

    /* Класс для отображения текущего активного шага */
    .card.active {
      display: flex;
    }

    /* Заголовок шага в стиле системных подзаголовков Android */
    .card-title {
      font-size: 1.1rem;
      font-weight: 500;
      color: #00acc1; 
      padding: 24px 24px 12px 24px;
      margin: 0;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 2px solid #00acc1;
    }

    /* Список кнопок внутри шага */
    .grid-buttons {
      display: flex;
      flex-direction: column;
    }

    /* Элементы списка настроек Android */
    button.menu-item {
      font-family: inherit;
      font-size: 1rem;
      font-weight: 400;
      padding: 18px 24px;
      border: none;
      background: transparent;
      color: #212121;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      text-align: left;
      width: 100%;
      border-bottom: 1px solid #eeeeee; 
      transition: background-color 0.15s ease;
      box-sizing: border-box;
    }

    .grid-buttons button.menu-item:last-child {
      border-bottom: none;
    }

    /* Эффект пульсации при наведении/нажатии */
    button.menu-item:hover, button.menu-item:active {
      background-color: ##4286f5 !important;
      color: #4286f5 !important;
    }

    /* Главная кнопка действия */
    .btn-tools.primary-action {
      background-color: #f9f9f9;
      font-weight: 500;
      color: #00796b;
    }

    /* Иконки перед текстом */
    button.menu-item::before {
      margin-right: 16px;
      font-size: 1.2rem;
      display: inline-block;
      width: 24px;
      text-align: center;
    }
    .icon-add::before { content: "✍️"; }
    .icon-edit::before { content: "📝"; }
    .icon-premium::before { content: "⚡"; }
    .icon-doc::before { content: "📄"; }
    .icon-well::before { content: "💧"; }
    .icon-a::before { content: "⬆️"; }

    /* Нижняя серая панель навигации (как на скриншоте) */
    .setup-navbar {
      background-color: #ededed;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 16px;
      height: 56px;
      border-top: 1px solid #dbdbdb;
    }

    /* Кнопки Назад / Далее */
    .nav-btn {
      background: transparent;
      border: none;
      color: #424242;
      font-size: 0.9rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      cursor: pointer;
      padding: 12px 16px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: background-color 0.2s;
    }

    .nav-btn:hover {
      background-color: rgba(0, 0, 0, 0.05);
    }

    /* Состояние, когда кнопка отключена (например, Назад на первом шаге) */
    .nav-btn:disabled {
      color: #b0b0b0;
      cursor: not-allowed;
      background: transparent;
    }
  </style>
</head>
<body>

  <div class="container">
    
    <!-- Левая колонка: Форма -->
    <main class="form-section">
      <script src="https://forms.yandex.ru/_static/embed.js"></script><iframe src="https://forms.yandex.ru/u/6a5ccd6590fa7bc19f9f5f19?iframe=1" frameborder="0" name="ya-form-6a5ccd6590fa7bc19f9f5f19" width="650"></iframe>
    </main>

    <!-- Правая колонка: Интерактивный мастер настроек Android -->
    <aside class="setup-wizard">
      
      <!-- Контейнер со всеми шагами -->
      <div class="steps-container">
        
        <!-- Шаг 1: Панель управления -->
        <div class="card active" data-step="1">
          <h2 class="card-title">Панель управления (1/4)</h2>
          <div class="grid-buttons">
            <button class="menu-item btn-tools primary-action icon-add" onclick="window.location.href='form.html';">Написать свою статью</button>
            <button class="menu-item btn-tools icon-edit" onclick="window.location.href='editor.html';">Редактировать статью</button>
            <button class="menu-item btn-tools icon-premium" onclick="window.location.href='editorpl.html';">Editor+</button>
            <button class="menu-item btn-tools icon-a" onclick="window.location.href='a/page.html';">a раздел</button>
            <button class="menu-item btn-tools icon-a" onclick="window.location.href='b/page.html';">b раздел</button>
          </div>
        </div>

        <!-- Шаг 2: Всё про колодцы -->
        <div class="card" data-step="2">
          <h2 class="card-title">Всё про колодцы (2/4)</h2>
          <div class="grid-buttons">
            <button class="menu-item btn-tools icon-well" onclick="window.location.href='form.html';">Раздел для колодцев</button>
            <button class="menu-item btn-pdf icon-doc" onclick="window.location.href='page1.pdf';">Свой колодец</button>
            <button class="menu-item btn-pdf icon-doc" onclick="window.location.href='page5.pdf';">Провести воду из колодца в дом</button>
            <button class="menu-item btn-pdf icon-doc" onclick="window.location.href='page6.pdf';">Погружной насос для колодца ручной</button>
            <button class="menu-item btn-pdf icon-doc" onclick="window.location.href='page7.pdf';">Колодец с ведром</button>
            <button class="menu-item btn-pdf icon-doc" onclick="window.location.href='page10.html';">Калькулятор стоимости колодца</button>
          </div>
        </div>

        <!-- Шаг 3: Напитки -->
        <div class="card" data-step="3">
          <h2 class="card-title">Напитки (3/4)</h2>
          <div class="grid-buttons">
            <button class="menu-item btn-tools icon-well" onclick="window.location.href='page11.html';">Самогон</button>
          </div>
        </div>

        <!-- Шаг 4: Полезные статьи -->
        <div class="card" data-step="4">
          <h2 class="card-title">Полезные статьи (4/4)</h2>
          <div class="grid-buttons">
            <button class="menu-item btn-pdf icon-doc" onclick="window.location.href='page2.pdf';">Как посадить голубику</button>
            <button class="menu-item btn-pdf icon-doc" onclick="window.location.href='page3.pdf';">Volkswagen Tiguan для семьи</button>
            <button class="menu-item btn-pdf icon-doc" onclick="window.location.href='page4.pdf';">2 санузел как сделать</button>
            <button class="menu-item btn-pdf icon-doc" onclick="window.location.href='page8.pdf';">Ягодная настойка</button>
            <button class="menu-item btn-pdf icon-doc" onclick="window.location.href='page9.html';">Подготовить дом к зиме</button>
          </div>
        </div>

      </div>

      <!-- Фирменная нижняя панель переключения -->
      <div class="setup-navbar">
        <button class="nav-btn" id="prevBtn" disabled>〈 Назад</button>
        <button class="nav-btn" id="nextBtn">Далее 〉</button>
      </div>

    </aside>

  </div>

  <!-- Скрипт логики переключения шагов -->
  <script>
    let currentStep = 1;
    const totalSteps = 4;

    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const cards = document.querySelectorAll('.card');

    function updateWizard() {
      // Переключаем видимость карточек
      cards.forEach(card => {
        if (parseInt(card.getAttribute('data-step')) === currentStep) {
          card.classList.add('active');
        } else {
          card.classList.remove('active');
        }
      });

      // Управляем доступностью кнопки "Назад"
      if (currentStep === 1) {
        prevBtn.disabled = true;
      } else {
        prevBtn.disabled = false;
      }

      // Изменяем текст кнопки "Далее" на последнем шаге
      if (currentStep === totalSteps) {
        nextBtn.innerText = 'Готово ✓';
      } else {
        nextBtn.innerText = 'Далее 〉';
      }
    }

    // Обработчик кнопки Назад
    prevBtn.addEventListener('click', () => {
      if (currentStep > 1) {
        currentStep--;
        updateWizard();
      }
    });

    // Обработчик кнопки Далее
    nextBtn.addEventListener('click', () => {
      if (currentStep < totalSteps) {
        currentStep++;
        updateWizard();
      } else {
        alert('Все категории закончились');
      }
    });
  </script>

</body>
</html>
