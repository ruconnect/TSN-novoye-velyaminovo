<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Современный Видеопроигрыватель</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background-color: #0f0f0f;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Главный контейнер плеера */
        .player-container {
            display: flex;
            width: 100%;
            max-width: 1100px;
            background-color: #1f1f1f;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        /* Зона с видео */
        .video-area {
            flex: 2;
            background-color: #000000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video {
            width: 100%;
            aspect-ratio: 16 / 9;
            display: block;
        }

        /* Боковой плейлист */
        .playlist {
            flex: 1;
            background-color: #181818;
            border-left: 1px solid #2d2d2d;
            max-height: 450px;
            overflow-y: auto;
        }

        .playlist-header {
            padding: 15px 20px;
            font-size: 1.1rem;
            font-weight: 600;
            border-bottom: 1px solid #2d2d2d;
            background-color: #1f1f1f;
            position: sticky;
            top: 0;
        }

        /* Элементы списка */
        .playlist-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px 20px;
            cursor: pointer;
            border-bottom: 1px solid #232323;
            transition: background-color 0.2s ease;
        }

        .playlist-item:hover {
            background-color: #272727;
        }

        .playlist-item.active {
            background-color: #383838;
            border-left: 4px solid #ff0000;
            padding-left: 16px;
        }

        .video-index {
            font-size: 0.9rem;
            color: #aaaaaa;
            min-width: 15px;
        }

        .video-title {
            font-size: 0.95rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Адаптивность для мобильных устройств */
        @media (max-width: 768px) {
            .player-container {
                flex-direction: column;
            }
            .playlist {
                border-left: none;
                border-top: 1px solid #2d2d2d;
                max-height: 300px;
            }
        }
    </style>
</head>
<body>

    <div class="player-container">
        <!-- Блок видеоплеера -->
        <div class="video-area">
            <video id="video-player" controls autoplay muted>
                <source src="https://googleapis.com" type="video/mp4">
                Ваш браузер не поддерживает воспроизведение видео.
            </video>
        </div>

        <!-- Блок выбора видео (Плейлист) -->
        <div class="playlist">
            <div class="playlist-header">Очередь воспроизведения</div>
            
            <div class="playlist-item active" data-src="https://googleapis.com">
                <span class="video-index">1</span>
                <span class="video-title">Big Buck Bunny (Мультфильм)</span>
            </div>
            
            <div class="playlist-item" data-src="https://googleapis.com">
                <span class="video-index">2</span>
                <span class="video-title">Elephant's Dream (Фантастика)</span>
            </div>
            
            <div class="playlist-item" data-src="https://googleapis.com">
                <span class="video-index">3</span>
                <span class="video-title">For Bigger Blazes (Трейлер)</span>
            </div>
            
            <div class="playlist-item" data-src="https://googleapis.com">
                <span class="video-index">4</span>
                <span class="video-title">Тест-драйв автомобиля</span>
            </div>
        </div>
    </div>

    <script>
        const player = document.getElementById('video-player');
        const tracks = document.querySelectorAll('.playlist-item');

        tracks.forEach(track => {
            track.addEventListener('click', function() {
                // Переключаем активный класс в меню
                document.querySelector('.playlist-item.active').classList.remove('active');
                this.classList.add('active');
                
                // Меняем путь к видео и запускаем
                player.src = this.getAttribute('data-src');
                player.play();
            });
        });
    </script>

</body>
</html>
