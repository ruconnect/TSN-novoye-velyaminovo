<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Умный калькулятор процентов</title>

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      color: #222;
    }

    .calculator {
      width: 100%;
      max-width: 520px;
      background: #ffffff;
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
    }

    .calculator h1 {
      font-size: 28px;
      margin-bottom: 10px;
      color: #2d2d2d;
      text-align: center;
    }

    .subtitle {
      text-align: center;
      color: #666;
      font-size: 15px;
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .mode-box {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
      color: #333;
    }

    select,
    input {
      width: 100%;
      padding: 14px 15px;
      border-radius: 12px;
      border: 1px solid #d6d6d6;
      font-size: 16px;
      outline: none;
      transition: 0.2s;
    }

    select:focus,
    input:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.15);
    }

    .fields {
      display: grid;
      gap: 16px;
      margin-bottom: 20px;
    }

    .hint {
      background: #f5f7ff;
      color: #4d5fa8;
      border-left: 4px solid #667eea;
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 14px;
      line-height: 1.45;
      margin-bottom: 20px;
    }

    button {
      width: 100%;
      border: none;
      padding: 15px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border-radius: 14px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 24px rgba(102, 126, 234, 0.35);
    }

    button:active {
      transform: translateY(0);
    }

      margin-top: 22px;
      padding: 18px;
      background: #f7f7fb;
      border-radius: 16px;
      border: 1px solid #e5e5ef;
      display: none;
    }

    .result.show {
      display: block;
    }
