<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server-Side Browser</title>
    <style>
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: sans-serif; display: flex; flex-direction: column; }
        .toolbar { display: flex; padding: 10px; background: #333; gap: 10px; align-items: center; }
        .toolbar input { flex: 1; padding: 8px; border: none; border-radius: 4px; font-size: 14px; }
        .toolbar button { padding: 8px 16px; border: none; background: #0070f3; color: white; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .toolbar button:hover { background: #0051b3; }
        iframe { flex: 1; border: none; width: 100%; background: white; }
    </style>
</head>
<body>

    <div class="toolbar">
        <input type="text" id="urlInput" placeholder="Введите URL (например, google.com)" value="example.com">
        <button onclick="navigate()">Перейти</button>
    </div>

    <iframe id="browserFrame" src=""></iframe>

    <script>
        function navigate() {
            const input = document.getElementById('urlInput').value.trim();
            if (!input) return;
            
            // Отправляем запрос на наш серверный прокси
            const proxyUrl = `/api/proxy?url=${encodeURIComponent(input)}`;
            document.getElementById('browserFrame').src = proxyUrl;
        }

        // Запуск при нажатии Enter
        document.getElementById('urlInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') navigate();
        });

        // Первичная загрузка
        window.onload = navigate;
    </script>
</body>
</html>
