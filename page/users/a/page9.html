<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор стоимости колодца</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Roboto', 'Segoe UI', -apple-system, sans-serif;
            background-color: #2196F3; /* Синий фон Android */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }

        /* Окно мастера настройки Android */
        .setup-window {
            background-color: #ffffff;
            width: 100%;
            max-width: 420px;
            height: 680px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
            position: relative;
        }

        /* Однотонная строгая шапка */
        .setup-header {
            background-color: #2196F3;
            color: #ffffff;
            padding: 40px 24px 20px 24px;
            flex-shrink: 0;
        }

        .setup-header h1 {
            font-size: 1.5rem;
            font-weight: 400;
        }

        /* Контентная прокручиваемая зона */
        .setup-content {
            padding: 24px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 24px;
            overflow-y: auto;
            scrollbar-width: none;
        }
        .setup-content::-webkit-scrollbar {
            display: none;
        }

        /* Группы полей в стиле Material Design */
        .form-group {
            display: flex;
            flex-direction: column;
            position: relative;
        }

        label {
            font-size: 0.85rem;
            font-weight: 400;
            color: #757575;
            margin-bottom: 4px;
        }

        /* Текстовые поля и селекторы (просто линия снизу) */
        input[type="number"], select {
            width: 100%;
            padding: 8px 0;
            font-size: 1rem;
            color: #212121;
            border: none;
            border-bottom: 1px solid #bcbcbc;
            outline: none;
            background: transparent;
            border-radius: 0;
            transition: border-color 0.2s;
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
        }

        /* Добавляем кастомную простую стрелочку для селектов */
        select {
            background-image: url("data:image/svg+xml;utf8,<svg fill='%23757575' height='24' viewBox='0 0 24 24' width='24' xmlns='http://w3.org'><path d='M7 10l5 5 5-5z'/></svg>");
            background-repeat: no-repeat;
            background-position: right center;
            padding-right: 24px;
        }

        input[type="number"]:focus, select:focus {
            border-bottom: 2px solid #2196F3;
        }

        .hint {
            font-size: 0.75rem;
            color: #9e9e9e;
            margin-top: 4px;
            line-height: 1.3;
        }

        /* Чекбокс в стиле Material */
        .checkbox-group {
            flex-direction: row;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            margin-top: 4px;
        }

        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #2196F3;
            cursor: pointer;
        }

        .checkbox-group span {
            font-size: 0.95rem;
            color: #212121;
        }

        /* Блок результатов — аккуратная калькуляция внизу списка */
        .result-box {
            margin-top: auto;
            padding-top: 16px;
            border-top: 1px dashed #e0e0e0;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: #616161;
        }

        .result-row.total {
            margin-top: 4px;
            font-size: 1.2rem;
            font-weight: 500;
            color: #212121;
        }

        /* Нижний статус-бар мастера с плоскими кнопками */
        .setup-footer {
            border-top: 1px solid #e0e0e0;
            padding: 8px 16px;
            display: flex;
            justify-content: flex-end;
            background-color: #ffffff;
            flex-shrink: 0;
        }

        .btn {
            background: none;
            border: none;
            color: #2196F3;
            font-size: 0.875rem;
            font-weight: 500;
            text-transform: uppercase;
            padding: 8px 16px;
            cursor: pointer;
            border-radius: 2px;
            transition: background-color 0.2s;
        }

        .btn:hover {
            background-color: rgba(33, 150, 243, 0.04);
        }
    </style>
</head>
<body>

    <div class="setup-window">
        <!-- Шапка -->
        <div class="setup-header">
            <h1>Расчет стоимости колодца</h1>
        </div>

        <!-- Поля формы -->
        <div class="setup-content">
            <!-- Количество колец -->
            <div class="form-group">
                <label for="rings">Количество колец (глубина)</label>
                <input type="number" id="rings" min="1" max="50" value="5" oninput="calculateTotal()">
                <div class="hint">Включая стоимость кольца и работу по шахте</div>
            </div>

            <!-- Тип грунта -->
            <div class="form-group">
                <label for="soil">Тип грунта</label>
                <select id="soil" onchange="calculateTotal()">
                    <option value="standard">Песок / Глина (обычный)</option>
                    <option value="hard">Каменистый / Плывун (+30%)</option>
                </select>
            </div>

            <!-- Донный фильтр -->
            <div class="form-group checkbox-group">
                <input type="checkbox" id="filter" onchange="calculateTotal()">
                <span>Установить донный фильтр</span>
            </div>
            <div class="hint" style="margin-top: -16px; padding-left: 30px;">Очищает воду от крупных частиц (песок, галька)</div>

            <!-- Домик для колодца -->
            <div class="form-group">
                <label for="house">Домик для колодца</label>
                <select id="house" onchange="calculateTotal()">
                    <option value="none">Без домика</option>
                    <option value="basic">Стандартный навес (дерево)</option>
                    <option value="premium">Закрытый домик с воротком</option>
                </select>
            </div>

            <!-- Блок вывода результатов -->
            <div class="result-box">
                <div class="result-row">
                    <span>Шахта и кольца:</span>
                    <span id="res-shaft">0 ₽</span>
                </div>
                <div class="result-row">
                    <span>Донный фильтр:</span>
                    <span id="res-filter">0 ₽</span>
                </div>
                <div class="result-row">
                    <span>Домик:</span>
                    <span id="res-house">0 ₽</span>
                </div>
                <div class="result-row total">
                    <span>Итого:</span>
                    <span id="res-total">0 ₽</span>
                </div>
            </div>
        </div>

        <!-- Нижняя панель -->
        <div class="setup-footer">
            <button class="btn" onclick="alert('Заявка оформлена!')">Готово</button>
        </div>
    </div>

<script>
    const PRICES = {
        ringCost: 6000,      
        filterCost: 4500,    
        houseBasic: 9000,    
        housePremium: 18000, 
        hardSoilMultiplier: 1.3 
    };

    function calculateTotal() {
        const ringsInput = document.getElementById('rings');
        let rings = parseInt(ringsInput.value);
        
        if (isNaN(rings) || rings < 0) rings = 0;

        const soilType = document.getElementById('soil').value;
        const hasFilter = document.getElementById('filter').checked;
        const houseType = document.getElementById('house').value;

        let baseRingPrice = PRICES.ringCost;
        if (soilType === 'hard') {
            baseRingPrice = PRICES.ringCost * PRICES.hardSoilMultiplier;
        }
        const shaftTotal = rings * baseRingPrice;
        const filterTotal = hasFilter ? PRICES.filterCost : 0;

        let houseTotal = 0;
        if (houseType === 'basic') {
            houseTotal = PRICES.houseBasic;
        } else if (houseType === 'premium') {
            houseTotal = PRICES.housePremium;
        }

        const totalSum = shaftTotal + filterTotal + houseTotal;

        document.getElementById('res-shaft').innerText = shaftTotal.toLocaleString('ru-RU') + ' ₽';
        document.getElementById('res-filter').innerText = filterTotal.toLocaleString('ru-RU') + ' ₽';
        document.getElementById('res-house').innerText = houseTotal.toLocaleString('ru-RU') + ' ₽';
        document.getElementById('res-total').innerText = totalSum.toLocaleString('ru-RU') + ' ₽';
    }

    window.onload = calculateTotal;
</script>

</body>
</html>
