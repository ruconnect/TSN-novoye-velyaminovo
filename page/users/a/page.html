<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Список статей</title>
    <style>
        /* Оригинальный градиентный фон Android Ice Cream Sandwich / Jelly Bean */
        body {
            font-family: 'Roboto', 'Helvetica Neue', Helvetica, sans-serif;
            background: radial-gradient(circle, #1a2634 0%, #0d1117 100%);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* Заголовок в стиле системного меню Android */
        h1 {
            color: #33b5e5; /* Фирменный цвет Holo Blue */
            font-weight: 300;
            text-transform: uppercase;
            font-size: 1.5rem;
            letter-spacing: 1px;
            margin-bottom: 25px;
            text-align: left;
            width: 100%;
            max-width: 560px;
            padding-left: 10px;
            border-bottom: 2px solid #33b5e5;
            padding-bottom: 10px;
        }

        /* Квадратный контейнер настроек */
        .article-container {
            display: flex;
            flex-direction: column;
            background-color: #161f2b; /* Темный блок меню */
            border: 1px solid #283747;
            width: 100%;
            max-width: 560px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
        }

        /* Кнопки-пункты меню */
        .article-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: transparent;
            color: #ffffff;
            text-decoration: none;
            padding: 22px 20px;
            font-size: 1.1rem;
            font-weight: 400;
            border-bottom: 1px solid #283747; /* Тонкий разделитель пунктов */
            transition: background-color 0.1s ease;
            box-sizing: border-box;
        }

        /* Удаляем нижнюю границу у последнего пункта */
        .article-btn:last-child {
            border-bottom: none;
        }

        /* Фирменное неоново-синее свечение при наведении и нажатии */
        .article-btn:hover, .article-btn:active {
            background-color: rgba(51, 181, 229, 0.2); /* Holo Blue с прозрачностью */
            color: #33b5e5;
            outline: none;
        }

        /* Минималистичный индикатор перехода в стиле старого Android */
        .article-btn::after {
            content: "";
            width: 8px;
            height: 8px;
            border-top: 2px solid #555555;
            border-right: 2px solid #555555;
            transform: rotate(45deg);
            transition: border-color 0.1s ease;
            margin-right: 5px;
        }

        /* Подсветка стрелочки при наведении */
        .article-btn:hover::after {
            border-color: #33b5e5;
        }
    </style>
</head>
<body>

    <h1>Полезные статьи</h1>

    <div class="article-container">
        
        <a href="page1.html" class="article-btn">Список целей</a>
        <a href="page2.html" class="article-btn">Видео</a>
        <a href="page3.html" class="article-btn">Шашки с ии</a>
        <a href="page4.html" class="article-btn">Игра</a>
        <a href="page5.html" class="article-btn">Игра дурак</a>
        
    </div>

</body>
</html>
