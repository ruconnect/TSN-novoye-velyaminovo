<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Редактор</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: #f4f4f9;
        }
        .toolbar {
            background-color: #2c3e50;
            padding: 10px 20px;
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 8px 16px;
            font-size: 14px;
            cursor: pointer;
            border-radius: 4px;
            transition: background 0.2s;
        }
        .btn:hover {
            background-color: #2980b9;
        }
        .btn-import {
            background-color: #2ecc71;
        }
        .btn-import:hover {
            background-color: #27ae60;
        }
        #file-input {
            display: none;
        }
        .container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .panel-title {
            background-color: #e2e8f0;
            padding: 6px 12px;
            font-size: 12px;
            font-weight: bold;
            color: #4a5568;
            text-transform: uppercase;
            border-bottom: 1px solid #cbd5e0;
        }
        textarea {
            width: 100%;
            height: 100%;
            resize: none;
            border: none;
            padding: 15px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            outline: none;
            background-color: #1e1e1e;
            color: #d4d4d4;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background-color: white;
        }
    </style>
</head>
<body>

    <div class="toolbar">
        <button class="btn btn-import" onclick="triggerImport()">Импортировать HTML</button>
        <input type="file" id="file-input" accept=".html,.htm" onchange="importHTML(event)">
        
        <button class="btn" onclick="downloadHTML()">Скачать HTML</button>
    </div>

    <div class="container">
        <div class="panel" style="border-right: 2px solid #cbd5e0;">
            <div class="panel-title">Редактор кода</div>
            <textarea id="code-editor" placeholder="Пишите HTML-код здесь..." oninput="updatePreview()"><!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; }
        h1 { color: #3498db; }
    </style>
</head>
<body>
    <h1>Привет, мир!</h1>
    <p>Отредактируйте этот текст, чтобы увидеть изменения.</p>
</body>
</html></textarea>
        </div>
        
        <div class="panel">
            <div class="panel-title">Предпросмотр</div>
            <iframe id="preview-window"></iframe>
        </div>
    </div>

    <script>
        const editor = document.getElementById('code-editor');
        const preview = document.getElementById('preview-window');
        const fileInput = document.getElementById('file-input');

        // Обновление окна предпросмотра
        function updatePreview() {
            const htmlContent = editor.value;
            const previewDoc = preview.contentDocument || preview.contentWindow.document;
            previewDoc.open();
            previewDoc.write(htmlContent);
            previewDoc.close();
        }

        // Симуляция клика по скрытому инпуту для выбора файла
        function triggerImport() {
            fileInput.click();
        }

        // Функция импорта HTML файла
        function importHTML(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                editor.value = e.target.result;
                updatePreview();
                // Сбрасываем значение инпута, чтобы можно было загрузить тот же файл повторно
                fileInput.value = '';
            };
            reader.readAsText(file);
        }

        // Функция скачивания HTML файла
        function downloadHTML() {
            const code = editor.value;
            const blob = new Blob([code], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = 'edited_index.html';
            document.body.appendChild(a);
            a.click();
            
            // Очистка памяти
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // Первоначальный запуск предпросмотра при загрузке страницы
        updatePreview();
    </script>
</body>
</html>
