<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Редактор</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            margin: 0;
            padding: 20px;
            background-color: #f5f7fb;
            color: #333;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h1 {
            margin-top: 0;
            font-size: 24px;
            color: #2c3e50;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 10px;
        }
        .file-actions {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .btn {
            background-color: #3498db;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: background 0.2s;
        }
        .btn:hover {
            background-color: #2980b9;
        }
        .btn-success {
            background-color: #2ecc71;
        }
        .btn-success:hover {
            background-color: #27ae60;
        }
        input[type="file"] {
            display: none;
        }
        .toolbar {
            background: #f8f9fa;
            border: 1px solid #ccc;
            border-bottom: none;
            padding: 8px;
            border-top-left-radius: 4px;
            border-top-right-radius: 4px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            align-items: center;
        }
        .toolbar select, .toolbar button {
            padding: 6px 10px;
            border: 1px solid #ddd;
            background: #fff;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
        }
        .toolbar button:hover {
            background: #e9ecef;
            border-color: #bbb;
        }
        .editor-container {
            border: 1px solid #ccc;
            border-bottom-left-radius: 4px;
            border-bottom-right-radius: 4px;
            background: #fff;
            min-height: 400px;
        }
        #editor {
            padding: 20px;
            min-height: 360px;
            outline: none;
            overflow-y: auto;
        }
        /* Стили для таблиц внутри редактора */
        #editor table {
            border-collapse: collapse;
            width: 100%;
            margin: 10px 0;
        }
        #editor table, #editor th, #editor td {
            border: 1px solid #aaa;
            padding: 8px;
        }
        #editor img {
            max-width: 100%;
            height: auto;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>HTML Редактор</h1>
    
    <!-- Кнопки импорта и экспорта -->
    <div class="file-actions">
        <label class="btn" for="importFile">📂 Импортировать HTML</label>
        <input type="file" id="importFile" accept=".html,.htm" onchange="importHTML(this)">
        
        <button class="btn btn-success" onclick="exportHTML()">💾 Скачать HTML</button>
    </div>

    <!-- Панель инструментов (Тулбар) -->
    <div class="toolbar">
        <!-- Форматы текста -->
        <select onchange="executeCmd('formatBlock', this.value); this.selectedIndex=0;">
            <option value="" selected disabled>Формат текста</option>
            <option value="p">Обычный текст (P)</option>
            <option value="h1">Заголовок 1 (H1)</option>
            <option value="h2">Заголовок 2 (H2)</option>
            <option value="h3">Заголовок 3 (H3)</option>
            <option value="h4">Заголовок 4 (H4)</option>
            <option value="pre">Код (PRE)</option>
        </select>

        <!-- Шрифт -->
        <select onchange="executeCmd('fontName', this.value); this.selectedIndex=0;">
            <option value="" selected disabled>Шрифт</option>
            <option value="Arial">Arial</option>
            <option value="Courier New">Courier New</option>
            <option value="Georgia">Georgia</option>
            <option value="Times New Roman">Times New Roman</option>
            <option value="Verdana">Verdana</option>
        </select>

        <!-- Стили текста -->
        <button onclick="executeCmd('bold')" title="Жирный"><b>B</b></button>
        <button onclick="executeCmd('italic')" title="Курсив"><i>I</i></button>
        <button onclick="executeCmd('underline')" title="Подчеркнутый"><u>U</u></button>
        <button onclick="executeCmd('strikeThrough')" title="Зачеркнутый"><s>S</s></button>
        
        <!-- Выравнивание -->
        <button onclick="executeCmd('justifyLeft')" title="По левому краю">←</button>
        <button onclick="executeCmd('justifyCenter')" title="По центру">↔</button>
        <button onclick="executeCmd('justifyRight')" title="По правому краю">→</button>

        <!-- Списки -->
        <button onclick="executeCmd('insertUnorderedList')" title="Маркированный список">&#8226; Список</button>
        <button onclick="executeCmd('insertOrderedList')" title="Нумерованный список">1. Список</button>

        <!-- Вставка медиа элементов -->
        <button onclick="insertImage()" style="background-color: #e8f4fd;" title="Вставить изображение">🖼️ Картинка</button>
        <button onclick="insertTable()" style="background-color: #e8fcf1;" title="Вставить таблицу">📊 Таблица</button>
        <button onclick="executeCmd('unlink')" title="Удалить ссылку">🔗❌</button>
        <button onclick="executeCmd('removeFormat')" title="Очистить форматирование">🧹 Очистить</button>
    </div>

    <!-- Область редактирования -->
    <div class="editor-container">
        <div id="editor" contenteditable="true">
            <h2>Добро пожаловать в редактор!</h2>
            <p>Вы можете выделить этот текст и изменить его формат, используя панель инструментов выше.</p>
        </div>
    </div>
</div>

<script>
    // Функция для выполнения стандартных команд форматирования
    function executeCmd(command, value = null) {
        document.execCommand(command, false, value);
        document.getElementById('editor').focus();
    }

    // Вставка изображения по ссылке
    function insertImage() {
        const url = prompt("Введите URL-адрес изображения:");
        if (url) {
            executeCmd('insertImage', url);
        }
    }

    // Вставка таблицы (динамическое создание HTML-кода таблицы)
    function insertTable() {
        const rows = prompt("Введите количество строк:", "3");
        const cols = prompt("Введите количество столбцов:", "3");
        
        if (rows && cols && !isNaN(rows) && !isNaN(cols)) {
            let tableHtml = '<table>';
            for (let i = 0; i < parseInt(rows); i++) {
                tableHtml += '<tr>';
                for (let j = 0; j < parseInt(cols); j++) {
                    // Используем th для первой строки (заголовки), иначе td
                    if (i === 0) {
                        tableHtml += '<th>Заголовок</th>';
                    } else {
                        tableHtml += '<td>Текст</td>';
                    }
                }
                tableHtml += '</tr>';
            }
            tableHtml += '</table><p></p>'; // Добавляем пустой абзац после таблицы для удобства
            
            executeCmd('insertHTML', tableHtml);
        }
    }

    // Импорт HTML файла
    function importHTML(input) {
        const file = input.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const content = e.target.result;
            
            // Извлекаем только содержимое тега body, если загружен полноценный документ
            if (content.includes('<body')) {
                const bodyContent = content.match(/<body[^>]*>([\s\S]*)<\/body>/i);
                if (bodyContent && bodyContent[1]) {
                    document.getElementById('editor').innerHTML = bodyContent[1];
                    return;
                }
            }
            // Если тега body нет, загружаем код как есть
            document.getElementById('editor').innerHTML = content;
        };
        reader.readAsText(file, 'UTF-8');
        // Сбрасываем значение input, чтобы можно было загрузить тот же файл повторно
        input.value = '';
    }

    // Экспорт (скачивание) HTML файла
    function exportHTML() {
        const editorContent = document.getElementById('editor').innerHTML;
        
        // Формируем структуру полноценного HTML документа
        const fullHtml = `<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Экспортированный документ</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        table { border-collapse: collapse; width: 100%; margin: 15px 0; }
        table, th, td { border: 1px solid #aaa; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        img { max-width: 100%; height: auto; }
    </style>
</head>
<body>
    ${editorContent}
</body>
</html>`;

        // Создаем blob и инициируем скачивание
        const blob = new Blob([fullHtml], { type: 'text/html;charset=utf-8;' });
        const link = document.createElement("a");
        
        link.href = URL.createObjectURL(blob);
        link.download = "edited_document.html";
        link.style.display = "none";
        
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>

</body>
</html>
