<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>b</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Roboto', 'Segoe UI', -apple-system, sans-serif;
            background-color: #2196F3;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }

        .setup-window {
            background-color: #ffffff;
            width: 100%;
            max-width: 420px;
            height: 650px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
            position: relative;
        }

        .setup-header {
            background-color: #2196F3;
            color: #ffffff;
            padding: 40px 24px 12px 24px;
            flex-shrink: 0;
        }

        .setup-header h1 {
            font-size: 1.5rem;
            font-weight: 400;
            margin-bottom: 4px;
        }

        .setup-header p {
            font-size: 0.875rem;
            opacity: 0.85;
        }

        /* Панель переключения категорий в стиле Android Tabs */
        .tabs-nav {
            display: flex;
            background-color: #2196F3;
            flex-shrink: 0;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .tabs-nav::-webkit-scrollbar {
            display: none;
        }

        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.7);
            padding: 14px 12px;
            font-size: 0.85rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            text-align: center;
            white-space: nowrap;
            position: relative;
            transition: color 0.2s ease;
        }

        /* Индикатор активной вкладки (белая линия снизу) */
        .tab-btn.active {
            color: #ffffff;
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background-color: #ffffff;
        }

        .setup-content {
            padding: 8px 0;
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            scrollbar-width: none;
        }
        
        .setup-content::-webkit-scrollbar {
            display: none;
        }

        /* Скрываем все секции по умолчанию */
        .category-section {
            display: none;
            margin-bottom: 16px;
        }

        /* Показываем только активную */
        .category-section.active {
            display: block;
        }

        .article-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            color: #212121;
            text-decoration: none;
            font-size: 1rem;
            border-bottom: 1px solid #f0f0f0;
            transition: background-color 0.15s ease;
            background: transparent;
        }

        .article-item:last-child {
            border-bottom: none;
        }

        .article-item:hover {
            background-color: #f5f5f5;
        }

        .article-meta {
            font-size: 0.8rem;
            color: #757575;
            white-space: nowrap;
            margin-left: 16px;
        }

        .setup-footer {
            border-top: 1px solid #e0e0e0;
            padding: 8px 16px;
            display: flex;
            justify-content: space-between;
            background-color: #ffffff;
            flex-shrink: 0;
        }

        .btn {
            background: none;
            border: none;
            color: #757575;
            font-size: 0.875rem;
            font-weight: 500;
            text-transform: uppercase;
            padding: 8px 16px;
            cursor: pointer;
            border-radius: 2px;
            transition: background-color 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
        }

        .btn:hover {
            background-color: rgba(0, 0, 0, 0.04);
        }

        .btn-primary {
            color: #2196F3;
        }

        .btn-primary:hover {
            background-color: rgba(33, 150, 243, 0.04);
        }
    </style>
</head>
<body>

    <div class="setup-window">
        <!-- Шапка -->
        <div class="setup-header">
            <h1>Страницы</h1>
            <p>Раздел b</p>
        </div>

        <!-- Кнопки переключения (data-target связывает кнопку со списком ниже) -->
        <div class="tabs-nav">
            <button class="tab-btn active" data-target="cat1">Вода</button>
            <button class="tab-btn" data-target="cat2">Категория 2</button>
        </div>

        <!-- Контент со списками по категориям -->
        <div class="setup-content">
            
            <!-- Категория 1 (изначально активна) -->
            <div id="cat1" class="category-section active">
                <a href="page1" class="article-item">
                    <span>Водопровод колодца</span>
                    <span class="article-meta">Вода в доме</span>
                </a>
                
                <a href="../game/index.html" class="article-item">
                    <span>Игры</span>
                    <span class="article-meta">Игры</span>
                </a>
            </div>

            <!-- Категория 2 -->
            <div id="cat2" class="category-section">
                <a href="ссылка_3.html" class="article-item">
                    <span>Название статьи или пункта 3</span>
                    <span class="article-meta">Доп. инфо 3</span>
                </a>
            </div>

        </div>

        <!-- Нижняя панель -->
        <div class="setup-footer">
            <a href="#" class="btn">Назад</a>
            <button class="btn btn-primary" id="nextTabBtn">Далее</button>
        </div>
    </div>

    <script>
        // Находим все кнопки вкладок и списки категорий
        const tabButtons = document.querySelectorAll('.tab-btn');
        const categorySections = document.querySelectorAll('.category-section');
        const nextTabBtn = document.getElementById('nextTabBtn');

        // Функция переключения
        function setActiveTab(targetId) {
            categorySections.forEach(section => {
                if (section.id === targetId) {
                    section.classList.add('active');
                } else {
                    section.classList.remove('active');
                }
            });

            tabButtons.forEach(btn => {
                if (btn.getAttribute('data-target') === targetId) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        }

        // Навешиваем клики на верхние кнопки
        tabButtons.forEach(button => {
            button.addEventListener('click', function(e) {
                e.preventDefault(); // Предотвращаем баги сборщиков кода
                const targetId = this.getAttribute('data-target');
                setActiveTab(targetId);
            });
        });

        // Логика для нижней кнопки "Далее" (автоматически переключает на следующую вкладку)
        if (nextTabBtn) {
            nextTabBtn.addEventListener('click', function() {
                const currentActiveBtn = document.querySelector('.tab-btn.active');
                if (currentActiveBtn) {
                    const nextBtn = currentActiveBtn.nextElementSibling;
                    if (nextBtn && nextBtn.classList.contains('tab-btn')) {
                        setActiveTab(nextBtn.getAttribute('data-target'));
                    } else {
                        // Если это была последняя вкладка, вызываем действие "Готово"
                        alert('Все вкладки пройдены!');
                    }
                }
            });
        }
    </script>
</body>
</html>
