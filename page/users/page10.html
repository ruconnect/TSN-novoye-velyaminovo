<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новое Вельяминово | Калькулятор стоимости колодца</title>
    <style>
        :root {
            --primary-color: #2b6cb0;
            --primary-hover: #2c5282;
            --bg-color: #f7fafc;
            --card-bg: #ffffff;
            --text-color: #2d3748;
            --border-color: #e2e8f0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .calc-container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 480px;
            border: 1px solid var(--border-color);
        }

        h2 {
            margin-top: 0;
            margin-bottom: 5px;
            color: var(--primary-color);
            text-align: center;
            font-size: 24px;
        }

        .subtitle {
            text-align: center;
            color: #718096;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="number"], select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 16px;
            background-color: #fff;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }

        input[type="number"]:focus, select:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            user-select: none;
        }

        .checkbox-group input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .result-box {
            background-color: #ebf8ff;
            border: 1px solid #bee3f8;
            padding: 20px;
            border-radius: 8px;
            margin-top: 25px;
            text-align: center;
        }

        .result-title {
            font-size: 14px;
            color: #2b6cb0;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .total-price {
            font-size: 32px;
            font-weight: 800;
            color: #2c5282;
        }

        .hint {
            font-size: 12px;
            color: #718096;
            margin-top: 15px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="calc-container">
    <h2>Расчет стоимости колодца</h2>
    <div class="subtitle">Новое Вельяминово</div>
    
    <!-- Количество колец -->
    <div class="form-group">
        <label for="rings">Количество колец (глубина):</label>
        <input type="number" id="rings" min="1" max="30" value="5" oninput="calculateWell()">
    </div>

    <!-- Тип донного фильтра -->
    <div class="form-group">
        <label for="filter">Донный фильтр:</label>
        <select id="filter" onchange="calculateWell()">
            <option value="0">Без фильтра</option>
            <option value="2500">Речная галька (2 500 ₽)</option>
            <option value="4000">Щебень шунгита (4 000 ₽)</option>
            <option value="5500">Щебень + щит из осины (5 500 ₽)</option>
        </select>
    </div>

    <!-- Глиняный замок -->
    <div class="form-group checkbox-group">
        <input type="checkbox" id="clayCastle" onchange="calculateWell()">
        <label for="clayCastle">Устройство глиняного замка (+5 000 ₽)</label>
    </div>

    <!-- Доставка -->
    <div class="form-group checkbox-group">
        <input type="checkbox" id="delivery" onchange="calculateWell()">
        <label for="delivery">Доставка материалов (+3 500 ₽)</label>
    </div>

    <!-- Итоговая стоимость -->
    <div class="result-box">
        <div class="result-title">Итоговая стоимость под ключ</div>
        <div class="total-price"><span id="totalPrice">0</span> ₽</div>
    </div>

    <div class="hint">* Расчет является предварительным. Точная стоимость зависит от типа грунта.</div>
</div>

<script>
    function calculateWell() {
        const PRICE_PER_RING_WITH_WORK = 6500; 
        const PRICE_CLAY_CASTLE = 5000;       
        const PRICE_DELIVERY = 3500;          

        let ringsCount = parseInt(document.getElementById('rings').value) || 0;
        let filterPrice = parseInt(document.getElementById('filter').value);
        let hasClayCastle = document.getElementById('clayCastle').checked;
        let hasDelivery = document.getElementById('delivery').checked;

        if (ringsCount < 0) {
            ringsCount = 0;
            document.getElementById('rings').value = 0;
        }

        let total = ringsCount * PRICE_PER_RING_WITH_WORK;
        total += filterPrice;
        
        if (hasClayCastle) {
            total += PRICE_CLAY_CASTLE;
        }
        
        if (hasDelivery) {
            total += PRICE_DELIVERY;
        }

        document.getElementById('totalPrice').innerText = total.toLocaleString('ru-RU');
    }

    window.onload = calculateWell;
</script>

</body>
</html>
