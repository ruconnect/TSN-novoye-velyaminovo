<div class="slide" name="slide" id="slideslideIface1"><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" class="slides-canvas" width="10in" height="5.625in" pointer-events="none" viewBox="0 0 720 405" version="1.1">
  <g text-rendering="geometricPrecision" pointer-events="painted" transform="scale(1,1)">
<rect x="0" y="0" width="720" height="405" fill="#ffffff"></rect>
<g transform="matrix(1, 0, 0, 1, 36, 27.8999939)">
  <text font-family="SB Sans Display Bold" font-weight="bold" font-size="23.25pt" fill="#000000">
<tspan x="0" y="23.3010178" textLength="226.15">Летний отдых</tspan>
<tspan x="226.15" y="23.3010178" textLength="9.2"> </tspan>
<tspan x="0" y="56.3010178" textLength="134.15">в&nbsp;Новом</tspan>
<tspan x="134.15" y="56.3010178" textLength="9.2"> </tspan>
<tspan x="0" y="89.30102" textLength="293.95">Вельяминово: гид</tspan>
<tspan x="293.95" y="89.30102" textLength="9.2"> </tspan>
<tspan x="0" y="122.301018" textLength="164.05">по&nbsp;местам</tspan>
<tspan x="164.05" y="122.301018" textLength="9.2"> </tspan>
<tspan x="0" y="155.301025" textLength="218.775">для&nbsp;плавания</tspan>
</text>
</g>
<g transform="matrix(1, 0, 0, 1, 36, 206.1)">
  <text font-family="SB Sans Text" font-size="9.75pt" fill="#000000">
<tspan x="0" y="15.832283" textLength="584.4">В&nbsp;самом поселке Новый Вельяминово отсутствуют крупные оборудованные пляжи. Поэтому</tspan>
<tspan x="584.4" y="15.832283" textLength="3.575"> </tspan>
<tspan x="0" y="36.6322823" textLength="621.925">для&nbsp;комфортного и&nbsp;безопасного плавания стоит обратить внимание на&nbsp;прилегающие территории.</tspan>
<tspan x="621.925" y="36.6322823" textLength="3.575"> </tspan>
<tspan x="0" y="57.43228" textLength="633.45">В&nbsp;этом обзоре мы&nbsp;проанализируем доступные водоемы, оценим их&nbsp;безопасность и&nbsp;инфраструктуру,</tspan>
<tspan x="633.45" y="57.43228" textLength="3.575"> </tspan>
<tspan x="0" y="78.2322845" textLength="660.25">а&nbsp;также рассмотрим альтернативные варианты отдыха у&nbsp;воды, чтобы вы&nbsp;могли спланировать идеальный</tspan>
<tspan x="660.25" y="78.2322845" textLength="3.575"> </tspan>
<tspan x="0" y="99.03228" textLength="81.775">летний день.</tspan>
</text>
</g>
</g>
</svg></div>
<div class="slide" name="slide" id="slideslideIface2"><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" class="slides-canvas" width="10in" height="5.625in" pointer-events="none" viewBox="0 0 720 405" version="1.1">
  <g text-rendering="geometricPrecision" pointer-events="painted" transform="scale(1,1)">
<rect x="0" y="0" width="720" height="405" fill="#ffffff"></rect>
<g transform="matrix(1, 0, 0, 1, 36, 27.8999977)">
  <text font-family="SB Sans Display Bold" font-weight="bold" font-size="15.75pt" fill="#000000">
<tspan x="0" y="16.8015938" textLength="251.575">Обзор доступных водных</tspan>
<tspan x="251.575" y="16.8015938" textLength="5.1"> </tspan>
<tspan x="0" y="40.8015938" textLength="92.425">объектов</tspan>
</text>
</g>
<g transform="matrix(1, 0, 0, 1, 36, 84.59999)">
  <text font-family="SB Sans Text" font-size="9.75pt" fill="#000000">
<tspan x="0" y="15.832283" textLength="213.075">В&nbsp;шаговой доступности от&nbsp;Нового</tspan>
<tspan x="213.075" y="15.832283" textLength="3.575"> </tspan>
<tspan x="0" y="36.6322823" textLength="261.575">Вельяминово преобладают естественные</tspan>
<tspan x="261.575" y="36.6322823" textLength="3.575"> </tspan>
<tspan x="0" y="57.43228" textLength="244.3">и&nbsp;искусственные водоемы, требующие</tspan>
<tspan x="244.3" y="57.43228" textLength="3.575"> </tspan>
<tspan x="0" y="78.2322845" textLength="271.8">внимательного подхода. При&nbsp;анализе мест</tspan>
<tspan x="271.8" y="78.2322845" textLength="3.575"> </tspan>
<tspan x="0" y="99.03228" textLength="250.2">для&nbsp;купания учитываются безопасность</tspan>
<tspan x="250.2" y="99.03228" textLength="3.575"> </tspan>
<tspan x="0" y="119.832283" textLength="262.175">спусков к&nbsp;воде, чистота береговой линии</tspan>
<tspan x="262.175" y="119.832283" textLength="3.575"> </tspan>
<tspan x="0" y="140.6323" textLength="270.425">и&nbsp;наличие удобных подходов. Оценка этих</tspan>
<tspan x="270.425" y="140.6323" textLength="3.575"> </tspan>
<tspan x="0" y="161.432281" textLength="260.325">факторов является ключевым критерием</tspan>
<tspan x="260.325" y="161.432281" textLength="3.575"> </tspan>
<tspan x="0" y="182.232269" textLength="133.925">для&nbsp;выбора локации.</tspan>
</text>
</g>
</g>
</svg></div>
<div class="slide" name="slide" id="slideslideIface3"><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" class="slides-canvas" width="10in" height="5.625in" pointer-events="none" viewBox="0 0 720 405" version="1.1">
  <g text-rendering="geometricPrecision" pointer-events="painted" transform="scale(1,1)">
<rect x="0" y="0" width="720" height="405" fill="#ffffff"></rect>
<g transform="matrix(1, 0, 0, 1, 36, 27.8999977)">
  <text font-family="SB Sans Display Bold" font-weight="bold" font-size="15.75pt" fill="#000000">
<tspan x="0" y="16.8015938" textLength="249.825">Ближайшие реки и&nbsp;озера</tspan>
</text>
</g>
<g transform="matrix(1, 0, 0, 1, 14.3999939, 64.3500061)">
  <text font-family="SB Sans Text" font-size="9.75pt" fill="#000000">
<tspan x="0" y="15.832283" textLength="278.85">К&nbsp;основным природным водоемам в&nbsp;районе</tspan>
<tspan x="278.85" y="15.832283" textLength="3.575"> </tspan>
<tspan x="0" y="36.6322823" textLength="280.5">Нового Вельяминово относятся река Скнига</tspan>
<tspan x="280.5" y="36.6322823" textLength="3.575"> </tspan>
<tspan x="0" y="57.43228" textLength="185.075">и&nbsp;озеро в&nbsp;прилегающем СНТ.</tspan>
<tspan x="0" y="79.2322845" textLength="80.45" font-family="SB Sans Text Bold" font-weight="bold">Река Скнига</tspan>
<tspan x="80.45" y="79.2322845" textLength="211.075">&nbsp;— популярное место для&nbsp;отдыха.</tspan>
<tspan x="291.525" y="79.2322845" textLength="3.575"> </tspan>
<tspan x="0" y="100.03228" textLength="324.525">При&nbsp;выборе участка для&nbsp;купания следует обращать</tspan>
<tspan x="324.525" y="100.03228" textLength="3.575"> </tspan>
<tspan x="0" y="120.832283" textLength="299.475">внимание на&nbsp;состояние пляжей, которые могут</tspan>
<tspan x="299.475" y="120.832283" textLength="3.575"> </tspan>
<tspan x="0" y="141.6323" textLength="320.9">быть как&nbsp;песчаными, так и&nbsp;травянистыми. Течение</tspan>
<tspan x="320.9" y="141.6323" textLength="3.575"> </tspan>
<tspan x="0" y="162.432281" textLength="295.8">на&nbsp;разных участках реки варьируется, поэтому</tspan>
<tspan x="295.8" y="162.432281" textLength="3.575"> </tspan>
<tspan x="0" y="183.232269" textLength="315.125">для&nbsp;детей и&nbsp;неуверенных пловцов рекомендуется</tspan>
<tspan x="315.125" y="183.232269" textLength="3.575"> </tspan>
<tspan x="0" y="204.032257" textLength="321.45">выбирать места со&nbsp;слабым течением и&nbsp;неглубоким</tspan>
<tspan x="321.45" y="204.032257" textLength="3.575"> </tspan>
<tspan x="0" y="224.832245" textLength="100">заходом в&nbsp;воду.</tspan>
<tspan x="0" y="247.632233" textLength="261.5" font-family="SB Sans Text Bold" font-weight="bold">Озеро в&nbsp;соседнем коттеджном поселке</tspan>
<tspan x="261.5" y="247.632233" textLength="43.7"> может</tspan>
<tspan x="305.2" y="247.632233" textLength="3.575"> </tspan>
<tspan x="0" y="268.43222" textLength="251.15">представлять собой альтернативу реке.</tspan>
<tspan x="251.15" y="268.43222" textLength="3.575"> </tspan>
<tspan x="0" y="289.2322" textLength="323.45">При&nbsp;планировании визита важно заранее уточнить</tspan>
<tspan x="323.45" y="289.2322" textLength="3.575"> </tspan>
<tspan x="0" y="310.0322" textLength="305.7">доступность прохода к&nbsp;воде, так как&nbsp;территория</tspan>
<tspan x="305.7" y="310.0322" textLength="3.575"> </tspan>
<tspan x="0" y="330.832184" textLength="276.95">может быть закрытой. Чистота воды в&nbsp;таких</tspan>
<tspan x="276.95" y="330.832184" textLength="3.575"> </tspan>
<tspan x="0" y="351.632172" textLength="293.3">водоемах, как&nbsp;правило, выше, чем в&nbsp;реке, что</tspan>
<tspan x="293.3" y="351.632172" textLength="3.575"> </tspan>
<tspan x="0" y="372.432159" textLength="256">является существенным преимуществом</tspan>
<tspan x="256" y="372.432159" textLength="3.575"> </tspan>
<tspan x="0" y="393.232147" textLength="81.775">для&nbsp;купания.</tspan>
</text>
</g>
</g>
</svg></div>
<div class="slide" name="slide" id="slideslideIface4"><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" class="slides-canvas" width="10in" height="5.625in" pointer-events="none" viewBox="0 0 720 405" version="1.1">
  <g text-rendering="geometricPrecision" pointer-events="painted" transform="scale(1,1)">
<rect x="0" y="0" width="720" height="405" fill="#ffffff"></rect>
<g transform="matrix(1, 0, 0, 1, 230.4, 27.8999977)">
  <text font-family="SB Sans Display Bold" font-weight="bold" font-size="15.75pt" fill="#000000">
<tspan x="0" y="16.8015938" textLength="231.725">Базы отдыха и&nbsp;платные</tspan>
<tspan x="231.725" y="16.8015938" textLength="5.1"> </tspan>
<tspan x="0" y="40.8015938" textLength="219">пляжи в&nbsp;окрестностях</tspan>
</text>
</g>
<g transform="matrix(1, 0, 0, 1, 230.4, 84.6000061)">
  <text font-family="SB Sans Text" font-size="9.75pt" fill="#000000">
<tspan x="0" y="15.832283" textLength="459.7">В&nbsp;радиусе 15-20 км&nbsp;от&nbsp;Нового Вельяминово расположено несколько баз</tspan>
<tspan x="459.7" y="15.832283" textLength="3.575"> </tspan>
<tspan x="0" y="36.6322823" textLength="458.125">отдыха, предлагающих оборудованные и&nbsp;безопасные зоны для&nbsp;купания.</tspan>
<tspan x="458.125" y="36.6322823" textLength="3.575"> </tspan>
<tspan x="0" y="57.43228" textLength="457.45">В&nbsp;отличие от&nbsp;стихийных пляжей, такие локации предоставляют базовый</tspan>
<tspan x="457.45" y="57.43228" textLength="3.575"> </tspan>
<tspan x="0" y="78.2322845" textLength="419.9">комфорт: как&nbsp;правило, это шезлонги, навесы от&nbsp;солнца и&nbsp;кабинки</tspan>
<tspan x="419.9" y="78.2322845" textLength="3.575"> </tspan>
<tspan x="0" y="99.03228" textLength="120.275">для&nbsp;переодевания.</tspan>
<tspan x="0" y="120.832283" textLength="466.975">Стоимость входного билета или&nbsp;аренды места варьируется в&nbsp;зависимости</tspan>
<tspan x="466.975" y="120.832283" textLength="3.575"> </tspan>
<tspan x="0" y="141.6323" textLength="461.575">от&nbsp;дня недели и&nbsp;уровня инфраструктуры. Многие комплексы предлагают</tspan>
<tspan x="461.575" y="141.6323" textLength="3.575"> </tspan>
<tspan x="0" y="162.432281" textLength="445.375">дополнительные услуги, включая прокат катамаранов, лодок, а&nbsp;также</tspan>
<tspan x="445.375" y="162.432281" textLength="3.575"> </tspan>
<tspan x="0" y="183.232269" textLength="447.925">работают кафе или&nbsp;пункты общественного питания. При&nbsp;выборе места</tspan>
<tspan x="447.925" y="183.232269" textLength="3.575"> </tspan>
<tspan x="0" y="204.032257" textLength="471.8">рекомендуется заранее уточнять наличие спасательного поста и&nbsp;перечень</tspan>
<tspan x="471.8" y="204.032257" textLength="3.575"> </tspan>
<tspan x="0" y="224.832245" textLength="154.775">доступных развлечений.</tspan>
</text>
</g>
</g>
</svg></div>
<div class="slide" name="slide" id="slideslideIface5"><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" class="slides-canvas" width="10in" height="5.625in" pointer-events="none" viewBox="0 0 720 405" version="1.1">

  <text font-family="SB Sans Display Bold" font-weight="bold" font-size="15.75pt" fill="#000000">
<tspan x="0" y="16.8015938" textLength="165.65">Инфраструктура</tspan>
<tspan x="165.65" y="16.8015938" textLength="5.1"> </tspan>
<tspan x="0" y="40.8015938" textLength="151.275">и&nbsp;безопасность</tspan>
</text>
</g>
<g transform="matrix(1, 0, 0, 1, 36, 84.6)">
  <text font-family="SB Sans Text" font-size="9.75pt" fill="#000000">
<tspan x="0" y="15.832283" textLength="271.55">На&nbsp;организованных пляжах и&nbsp;базах отдыха</tspan>
<tspan x="271.55" y="15.832283" textLength="3.575"> </tspan>
<tspan x="0" y="36.6322823" textLength="282.075">работают спасательные посты. Чистота воды</tspan>
<tspan x="282.075" y="36.6322823" textLength="3.575"> </tspan>
<tspan x="0" y="57.43228" textLength="276.575">и&nbsp;берега оценивается по&nbsp;отзывам, на&nbsp;диких</tspan>
<tspan x="276.575" y="57.43228" textLength="3.575"> </tspan>
<tspan x="0" y="78.2322845" textLength="197.925">участках она может быть ниже.</tspan>
</text>
</g>
</g>
</svg></div>

  <text font-family="SB Sans Display Bold" font-weight="bold" font-size="15.75pt" fill="#000000">
<tspan x="0" y="16.8015938" textLength="167.025">Альтернативный</tspan>
<tspan x="167.025" y="16.8015938" textLength="5.1"> </tspan>
<tspan x="0" y="40.8015938" textLength="130.45">отдых у&nbsp;воды</tspan>
</text>
</g>
<g transform="matrix(1, 0, 0, 1, 50.3999939, 92.7)">
  <text font-family="SB Sans Text" font-size="9.75pt" fill="#000000">
<tspan x="0" y="15.832283" textLength="166">Для&nbsp;тех, кто предпочитает</tspan>
<tspan x="166" y="15.832283" textLength="3.575"> </tspan>
<tspan x="0" y="36.6322823" textLength="143.75">созерцание активному</tspan>
<tspan x="143.75" y="36.6322823" textLength="3.575"> </tspan>
<tspan x="0" y="57.43228" textLength="129.35">плаванию, подойдут</tspan>
<tspan x="129.35" y="57.43228" textLength="3.575"> </tspan>
<tspan x="0" y="78.2322845" textLength="187.65">прогулочные зоны вдоль&nbsp;рек.</tspan>
<tspan x="187.65" y="78.2322845" textLength="3.575"> </tspan>
<tspan x="0" y="99.03228" textLength="168.175">Берега также располагают</tspan>
<tspan x="168.175" y="99.03228" textLength="3.575"> </tspan>
<tspan x="0" y="119.832283" textLength="141.3">к&nbsp;семейным пикникам</tspan>
<tspan x="141.3" y="119.832283" textLength="3.575"> </tspan>
<tspan x="0" y="140.6323" textLength="131.425">и&nbsp;рыбалке в&nbsp;тишине.</tspan>
</text>
</g>
</g>
</svg></div>
<div class="slide" name="slide" id="slideslideIface7"><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" class="slides-canvas" width="10in" height="5.625in" pointer-events="none" viewBox="0 0 720 405" version="1.1">
  <g text-rendering="geometricPrecision" pointer-events="painted" transform="scale(1,1)">
<rect x="0" y="0" width="720" height="405" fill="#ffffff"></rect>
<g transform="matrix(1, 0, 0, 1, 396, 27.8999977)">
  <text font-family="SB Sans Display Bold" font-weight="bold" font-size="15.75pt" fill="#000000">
<tspan x="0" y="16.8015938" textLength="190.475">Сезонные факторы</tspan>
</text>
</g>
<g transform="matrix(1, 0, 0, 1, 251.999985, 64.3500061)">
  <text font-family="SB Sans Text" font-size="9.75pt" fill="#000000">
<tspan x="0" y="15.832283" textLength="426.45">Температура воды в&nbsp;естественных водоемах достигает комфортных</tspan>
<tspan x="426.45" y="15.832283" textLength="3.575"> </tspan>
<tspan x="0" y="36.6322823" textLength="428.6">+20…+23 °C, как&nbsp;правило, к&nbsp;середине июня и&nbsp;сохраняется до&nbsp;конца</tspan>
<tspan x="428.6" y="36.6322823" textLength="3.575"> </tspan>
<tspan x="0" y="57.43228" textLength="436.8">августа. Прозрачность воды напрямую зависит от&nbsp;погодных условий:</tspan>
<tspan x="436.8" y="57.43228" textLength="3.575"> </tspan>
<tspan x="0" y="78.2322845" textLength="378.625">после дождей и&nbsp;сильных ветров она может снижаться из-за</tspan>
<tspan x="378.625" y="78.2322845" textLength="3.575"> </tspan>
<tspan x="0" y="99.03228" textLength="387.75">поднятия&nbsp;ила. Для&nbsp;купания наиболее благоприятны периоды</tspan>
<tspan x="387.75" y="99.03228" textLength="3.575"> </tspan>
<tspan x="0" y="119.832283" textLength="171.5">стабильной, ясной погоды.</tspan>
<tspan x="0" y="141.6323" textLength="398.275">Планировать посещение рек и&nbsp;озер рекомендуется в&nbsp;утренние</tspan>
<tspan x="398.275" y="141.6323" textLength="3.575"> </tspan>
<tspan x="0" y="162.432281" textLength="437.325">(до&nbsp;11:00) или&nbsp;вечерние (после 16:00) часы. В&nbsp;это время минимальна</tspan>
<tspan x="437.325" y="162.432281" textLength="3.575"> </tspan>
<tspan x="0" y="183.232269" textLength="430.175">солнечная активность, что снижает риск ожогов и&nbsp;теплового удара,</tspan>
<tspan x="430.175" y="183.232269" textLength="3.575"> </tspan>
<tspan x="0" y="204.032257" textLength="419.425">а&nbsp;также меньше купающихся, что обеспечивает больший комфорт</tspan>
<tspan x="419.425" y="204.032257" textLength="3.575"> </tspan>
<tspan x="0" y="224.832245" textLength="100.75">и&nbsp;безопасность.</tspan>
</text>
</g>
</g>
</svg></div>
<div class="slide" name="slide" id="slideslideIface8"><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" class="slides-canvas" width="10in" height="5.625in" pointer-events="none" viewBox="0 0 720 405" version="1.1">
  <g text-rendering="geometricPrecision" pointer-events="painted" transform="scale(1,1)">
<rect x="0" y="0" width="720" height="405" fill="#ffffff"></rect>
<g transform="matrix(1, 0, 0, 1, 36, 27.8999977)">
  <text font-family="SB Sans Display Bold" font-weight="bold" font-size="15.75pt" fill="#000000">
<tspan x="0" y="16.8015938" textLength="255.55">Сводная таблица: лучшие</tspan>
<tspan x="255.55" y="16.8015938" textLength="5.1"> </tspan>
<tspan x="0" y="40.8015938" textLength="195.425">места для&nbsp;плавания</tspan>
</text>
</g>
<g transform="matrix(1, 0, 0, 1, 381.600037, 129.150009)">
  <text font-family="SB Sans Text" font-size="9.75pt" fill="#000000">
<tspan x="0" y="15.832283" textLength="240.425">Для&nbsp;удобства выбора ключевые места</tspan>
<tspan x="240.425" y="15.832283" textLength="3.575"> </tspan>
<tspan x="0" y="36.6322823" textLength="233.05">для&nbsp;плавания в&nbsp;окрестностях Нового</tspan>
<tspan x="233.05" y="36.6322823" textLength="3.575"> </tspan>
<tspan x="0" y="57.43228" textLength="249.2">Вельяминово сведены в&nbsp;таблицу. В&nbsp;ней</tspan>
<tspan x="249.2" y="57.43228" textLength="3.575"> </tspan>
<tspan x="0" y="78.2322845" textLength="254.775">сравниваются расстояние, тип водоема,</tspan>
<tspan x="254.775" y="78.2322845" textLength="3.575"> </tspan>
<tspan x="0" y="99.03228" textLength="268.425">наличие инфраструктуры и&nbsp;стоимость. Это</tspan>
<tspan x="268.425" y="99.03228" textLength="3.575"> </tspan>
<tspan x="0" y="119.832283" textLength="274.8">позволяет быстро оценить плюсы и&nbsp;минусы</tspan>
<tspan x="274.8" y="119.832283" textLength="3.575"> </tspan>
<tspan x="0" y="140.6323" textLength="269.8">каждой локации, от&nbsp;диких пляжей на&nbsp;реке</tspan>
<tspan x="269.8" y="140.6323" textLength="3.575"> </tspan>
<tspan x="0" y="161.432281" textLength="294.725">Скнига до&nbsp;оборудованных зон на&nbsp;базах отдыха</tspan>
<tspan x="294.725" y="161.432281" textLength="3.575"> </tspan>
<tspan x="0" y="182.232269" textLength="104.45">в&nbsp;радиусе 20&nbsp;км.</tspan>
</text>
</g>
</g>
</svg></div>
<div class="slide" name="slide" id="slideslideIface9"><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" class="slides-canvas" width="10in" height="5.625in" pointer-events="none" viewBox="0 0 720 405" version="1.1">
  <g text-rendering="geometricPrecision" pointer-events="painted" transform="scale(1,1)">
<rect x="0" y="0" width="720" height="405" fill="#ffffff"></rect>
<g transform="matrix(1, 0, 0, 1, 36, 27.8999977)">
  <text font-family="SB Sans Display Bold" font-weight="bold" font-size="15.75pt" fill="#000000">
<tspan x="0" y="16.8015938" textLength="295.35">Рекомендации по&nbsp;подготовке</tspan>
<tspan x="295.35" y="16.8015938" textLength="5.1"> </tspan>
<tspan x="0" y="40.8015938" textLength="157.875">к&nbsp;отдыху у&nbsp;воды</tspan>
</text>
</g>
<g transform="matrix(1, 0, 0, 1, 36, 84.59999)">
  <text font-family="SB Sans Text" font-size="9.75pt" fill="#000000">
<tspan x="0" y="15.832283" textLength="263.9">Для&nbsp;комфортного отдыха на&nbsp;диком пляже</tspan>
<tspan x="263.9" y="15.832283" textLength="3.575"> </tspan>
<tspan x="0" y="36.6322823" textLength="276.925">в&nbsp;Новом Вельяминово рекомендуется взять</tspan>
<tspan x="276.925" y="36.6322823" textLength="3.575"> </tspan>
<tspan x="0" y="57.43228" textLength="47.65">с&nbsp;собой</tspan>
<tspan x="47.65" y="57.43228" textLength="3.575"> </tspan>
<tspan x="51.225" y="57.43228" textLength="132.225" font-family="SB Sans Text Bold" font-weight="bold">плед или&nbsp;подстилку</tspan>
<tspan x="183.450012" y="57.43228" textLength="4.45">,</tspan>
<tspan x="187.900009" y="57.43228" textLength="3.575"> </tspan>
<tspan x="191.475" y="57.43228" textLength="98.35" font-family="SB Sans Text Bold" font-weight="bold">питьевую воду</tspan>
<tspan x="289.825" y="57.43228" textLength="3.575"> </tspan>
<tspan x="0" y="78.2322845" textLength="11.525">и&nbsp;</tspan>
<tspan x="11.525" y="78.2322845" textLength="53.65" font-family="SB Sans Text Bold" font-weight="bold">перекус</tspan>
<tspan x="65.175" y="78.2322845" textLength="83.975">. Не&nbsp;забудьте</tspan>
<tspan x="149.15" y="78.2322845" textLength="3.575"> </tspan>
<tspan x="152.725" y="78.2322845" textLength="70.8" font-family="SB Sans Text Bold" font-weight="bold">полотенце</tspan>
<tspan x="223.525009" y="78.2322845" textLength="4.45">,</tspan>
<tspan x="227.975" y="78.2322845" textLength="3.575"> </tspan>
<tspan x="231.55" y="78.2322845" textLength="59.275" font-family="SB Sans Text Bold" font-weight="bold">сменную</tspan>
<tspan x="290.825" y="78.2322845" textLength="3.325" font-family="SB Sans Text Bold" font-weight="bold"> </tspan>
<tspan x="0" y="99.03228" textLength="93.275" font-family="SB Sans Text Bold" font-weight="bold">сухую одежду</tspan>
<tspan x="93.275" y="99.03228" textLength="15.1"> и&nbsp;</tspan>
<tspan x="108.375" y="99.03228" textLength="100.475" font-family="SB Sans Text Bold" font-weight="bold">удобную обувь</tspan>
<tspan x="208.85" y="99.03228" textLength="3.575"> </tspan>
<tspan x="0" y="119.832283" textLength="226.1">для&nbsp;перемещения по&nbsp;песку и&nbsp;траве.</tspan>
<tspan x="226.1" y="119.832283" textLength="3.575"> </tspan>
<tspan x="0" y="140.6323" textLength="223.15">Для&nbsp;защиты от&nbsp;солнца и&nbsp;насекомых</tspan>
<tspan x="223.15" y="140.6323" textLength="3.575"> </tspan>
<tspan x="0" y="161.432281" textLength="160.725">обязательно используйте</tspan>
<tspan x="160.725" y="161.432281" textLength="3.575"> </tspan>
<tspan x="164.3" y="161.432281" textLength="114.425" font-family="SB Sans Text Bold" font-weight="bold">солнцезащитный</tspan>
<tspan x="278.725" y="161.432281" textLength="3.325" font-family="SB Sans Text Bold" font-weight="bold"> </tspan>
<tspan x="0" y="182.232269" textLength="132.725" font-family="SB Sans Text Bold" font-weight="bold">крем с&nbsp;высоким SPF</tspan>
<tspan x="132.725" y="182.232269" textLength="4.45">,</tspan>
<tspan x="137.175" y="182.232269" textLength="3.575"> </tspan>
<tspan x="140.75" y="182.232269" textLength="98.1" font-family="SB Sans Text Bold" font-weight="bold">головной убор</tspan>
<tspan x="238.85" y="182.232269" textLength="4.45">,</tspan>
<tspan x="243.3" y="182.232269" textLength="3.575"> </tspan>
<tspan x="0" y="203.032257" textLength="148.925" font-family="SB Sans Text Bold" font-weight="bold">солнцезащитные очки</tspan>
<tspan x="148.925" y="203.032257" textLength="15.1"> и&nbsp;</tspan>
<tspan x="164.025009" y="203.032257" textLength="70.05" font-family="SB Sans Text Bold" font-weight="bold">репеллент</tspan>
<tspan x="234.075012" y="203.032257" textLength="4.325">.</tspan>
</text>
</g>
</g>
</svg></div>

  <text font-family="SB Sans Display Bold" font-weight="bold" font-size="15.75pt" fill="#000000">
<tspan x="0" y="16.8015938" textLength="185.125">Ключевые выводы</tspan>
</text>
</g>
<g transform="matrix(1, 0, 0, 1, 36, 64.35)">
  <text font-family="SB Sans Text" font-size="9.75pt" fill="#000000">
<tspan x="0" y="15.832283" textLength="210.175">В&nbsp;самом Новом Вельяминово нет</tspan>
<tspan x="210.175" y="15.832283" textLength="3.575"> </tspan>
<tspan x="0" y="36.6322823" textLength="290.7">оборудованных пляжей, поэтому для&nbsp;купания</tspan>
<tspan x="290.7" y="36.6322823" textLength="3.575"> </tspan>
<tspan x="0" y="57.43228" textLength="252.9">стоит рассматривать соседние локации.</tspan>
<tspan x="252.9" y="57.43228" textLength="3.575"> </tspan>
<tspan x="0" y="78.2322845" textLength="289.625">Наиболее комфортные и&nbsp;безопасные условия</tspan>
<tspan x="289.625" y="78.2322845" textLength="3.575"> </tspan>
<tspan x="0" y="99.03228" textLength="281.75">для&nbsp;плавания летом предоставляют платные</tspan>
<tspan x="281.75" y="99.03228" textLength="3.575"> </tspan>
<tspan x="0" y="119.832283" textLength="262.175">пляжи и&nbsp;базы отдыха в&nbsp;радиусе 15-20&nbsp;км.</tspan>
</text>
</g>
</g>
</svg></div>
<div class="slide" name="slide" id="slideslideIface11"><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" class="slides-canvas" width="10in" height="5.625in" pointer-events="none" viewBox="0 0 720 405" version="1.1">

  <text font-family="SB Sans Display Bold" font-weight="bold" font-size="15.75pt" fill="#000000">
<tspan x="0" y="16.8015938" textLength="248.975">Планирование маршрута</tspan>
<tspan x="248.975" y="16.8015938" textLength="5.1"> </tspan>
<tspan x="0" y="40.8015938" textLength="202.025">до&nbsp;мест для&nbsp;купания</tspan>
</text>
</g>
<g transform="matrix(1, 0, 0, 1, 396, 84.59999)">
  <text font-family="SB Sans Text" font-size="9.75pt" fill="#000000">
<tspan x="0" y="15.832283" textLength="255.575">Для&nbsp;поездки на&nbsp;автомобиле оптимально</tspan>
<tspan x="255.575" y="15.832283" textLength="3.575"> </tspan>
<tspan x="0" y="36.6322823" textLength="291.9">использовать навигатор, выстраивая маршрут</tspan>
<tspan x="291.9" y="36.6322823" textLength="3.575"> </tspan>
<tspan x="0" y="57.43228" textLength="236.3">до&nbsp;выбранной локации. Время в&nbsp;пути</tspan>
<tspan x="236.3" y="57.43228" textLength="3.575"> </tspan>
<tspan x="0" y="78.2322845" textLength="273.625">до&nbsp;ближайших рек и&nbsp;озёр составляет 15-20</tspan>
<tspan x="273.625" y="78.2322845" textLength="3.575"> </tspan>
<tspan x="0" y="99.03228" textLength="238.575">минут. До&nbsp;баз отдыха в&nbsp;радиусе 15-20</tspan>
<tspan x="238.575" y="99.03228" textLength="3.575"> </tspan>
<tspan x="0" y="119.832283" textLength="231.925">км&nbsp;можно добраться за&nbsp;20-30 минут.</tspan>
<tspan x="231.925" y="119.832283" textLength="3.575"> </tspan>
<tspan x="0" y="140.6323" textLength="260.525">Общественный транспорт в&nbsp;летний сезон</tspan>
<tspan x="260.525" y="140.6323" textLength="3.575"> </tspan>
<tspan x="0" y="161.432281" textLength="202.925">может быть ограничен, поэтому</tspan>
<tspan x="202.925" y="161.432281" textLength="3.575"> </tspan>
<tspan x="0" y="182.232269" textLength="279.25">рекомендуется планировать выезд заранее.</tspan>
</text>
</g>
</g>
</svg></div>
