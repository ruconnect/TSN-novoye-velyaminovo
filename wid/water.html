<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Температура воды</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: transparent;
    }

    .water-widget {
      width: 100%;
      max-width: 560px;
      padding: 18px;
      border-radius: 18px;
      background: linear-gradient(135deg, #0676c9, #13c8e8);
      color: #ffffff;
      box-shadow: 0 12px 30px rgba(0, 80, 140, 0.25);
    }

    .widget-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 16px;
    }

    .widget-title {
      margin: 0;
      font-size: 20px;
      font-weight: 700;
    }

    .widget-subtitle {
      margin-top: 5px;
      font-size: 13px;
      opacity: 0.9;
    }

    .refresh-btn {
      border: none;
      border-radius: 12px;
      padding: 9px 12px;
      background: rgba(255, 255, 255, 0.2);
      color: white;
      cursor: pointer;
      font-size: 13px;
      transition: 0.2s;
      white-space: nowrap;
    }

    .refresh-btn:hover {
      background: rgba(255, 255, 255, 0.32);
    }

    .refresh-btn:disabled {
      opacity: 0.6;
      cursor: default;
    }

    .place-select {
      width: 100%;
      border: none;
      outline: none;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 14px;
      font-size: 15px;
      color: #0a3958;
      background: #ffffff;
    }

    .current-card {
      padding: 18px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.18);
      backdrop-filter: blur(8px);
      margin-bottom: 14px;
      min-height: 125px;
    }

    .place-name {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .temperature-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .temperature {
      font-size: 46px;
      font-weight: 800;
      line-height: 1;
    }

    .water-icon {
      font-size: 46px;
    }

    .details {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .detail-box {
      padding: 12px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.16);
    }

    .detail-label {
      font-size: 12px;
      opacity: 0.85;
      margin-bottom: 4px;
    }

    .detail-value {
      font-size: 15px;
      font-weight: 700;
    }

    .message {
      margin-top: 12px;
      padding: 12px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.16);
      font-size: 13px;
      line-height: 1.4;
      display: none;
    }

    .message.show {
      display: block;
    }

    .footer {
      margin-top: 12px;
      font-size: 11px;
      opacity: 0.85;
      text-align: center;
      line-height: 1.4;
    }

    @media (max-width: 420px) {
      .water-widget {
        border-radius: 0;
      }

      .details {
        grid-template-columns: 1fr;
      }

      .temperature {
        font-size: 40px;
      }
    }
  </style>
</head>

<body>
  <div class="water-widget">
    <div class="widget-header">
      <div>
        <h2 class="widget-title">Температура воды</h2>
        <div class="widget-subtitle">Моря и водоёмы Подмосковья</div>
      </div>

      <button class="refresh-btn" id="refreshBtn">Обновить</button>
    </div>

    <select class="place-select" id="placeSelect"></select>

    <div class="current-card">
      <div class="place-name" id="placeName">—</div>

      <div class="temperature-row">
        <div class="temperature" id="temperature">—</div>
        <div class="water-icon">🌊</div>
      </div>
    </div>

    <div class="details">
      <div class="detail-box">
        <div class="detail-label">Состояние</div>
        <div class="detail-value" id="status">—</div>
      </div>

      <div class="detail-box">
        <div class="detail-label">Акватория</div>
        <div class="detail-value" id="waterPlace">—</div>
      </div>

      <div class="detail-box">
        <div class="detail-label">Время данных</div>
        <div class="detail-value" id="dataTime">—</div>
      </div>

      <div class="detail-box">
        <div class="detail-label">Тип данных</div>
        <div class="detail-value" id="dataType">—</div>
      </div>
    </div>

    <div class="message" id="message"></div>

    <div class="footer">
      Источник: Open-Meteo. Для внутренних водоёмов реальные данные могут быть недоступны, тогда используется оценка по температуре воздуха.
    </div>
  </div>

  <script>
    const places = [
      {
        id: "sochi",
        name: "Сочи",
        waterPlace: "Чёрное море",
        latitude: 43.5853,
        longitude: 39.7203,
        type: "sea"
      },
      {
        id: "anapa",
        name: "Анапа",
        waterPlace: "Чёрное море",
        latitude: 44.8950,
        longitude: 37.3167,
        type: "sea"
      },
      {
        id: "gelendzhik",
        name: "Геленджик",
        waterPlace: "Чёрное море",
        latitude: 44.5622,
        longitude: 38.0848,
        type: "sea"
      },
      {
        id: "tuapse",
        name: "Туапсе",
        waterPlace: "Чёрное море",
        latitude: 44.1053,
        longitude: 39.0802,
        type: "sea"
      },
      {
        id: "novorossiysk",
        name: "Новороссийск",
        waterPlace: "Чёрное море",
        latitude: 44.7239,
        longitude: 37.7686,
        type: "sea"
      },
      {
        id: "vladivostok",
        name: "Владивосток",
        waterPlace: "Японское море",
        latitude: 43.1155,
        longitude: 131.8855,
        type: "sea"
      },
      {
        id: "kaliningrad",
        name: "Калининград",
        waterPlace: "Балтийское море",
        latitude: 54.7104,
        longitude: 20.4522,
        type: "sea"
      },
      {
        id: "murmansk",
        name: "Мурманск",
        waterPlace: "Баренцево море",
        latitude: 68.9707,
        longitude: 33.0749,
        type: "sea"
      },
      {
        id: "petropavlovsk",
        name: "Петропавловск-Камчатский",
        waterPlace: "Тихий океан",
        latitude: 53.0241,
        longitude: 158.6435,
        type: "sea"
      },
      {
        id: "istra_reservoir",
        name: "Истринское водохранилище",
        waterPlace: "Подмосковье",
        latitude: 56.0700,
        longitude: 36.7400,
        type: "inland"
      },
      {
        id: "mozhaysk_reservoir",
        name: "Можайское водохранилище",
        waterPlace: "Подмосковье",
        latitude: 55.5600,
        longitude: 35.8500,
        type: "inland"
      },
      {
        id: "klyazma_reservoir",
        name: "Клязьминское водохранилище",
        waterPlace: "Подмосковье",
        latitude: 55.9900,
        longitude: 37.6100,
        type: "inland"
      },
      {
        id: "pirogovo_reservoir",
        name: "Пироговское водохранилище",
        waterPlace: "Подмосковье",
        latitude: 55.9850,
        longitude: 37.6750,
        type: "inland"
      },
      {
        id: "ruza_reservoir",
        name: "Рузское водохранилище",
        waterPlace: "Подмосковье",
        latitude: 55.7900,
        longitude: 36.1000,
        type: "inland"
      },
      {
        id: "ozerninskoe_reservoir",
        name: "Озернинское водохранилище",
        waterPlace: "Подмосковье",
        latitude: 55.7600,
        longitude: 36.2200,
        type: "inland"
      },
      {
        id: "senezh_lake",
        name: "Озеро Сенеж",
        waterPlace: "Подмосковье",
        latitude: 56.1900,
        longitude: 37.0000,
        type: "inland"
      },
      {
        id: "biserovo_lake",
        name: "Бисерово озеро",
        waterPlace: "Подмосковье",
        latitude: 55.7800,
        longitude: 38.1200,
        type: "inland"
      }
    ];

    const placeSelect = document.getElementById("placeSelect");
    const refreshBtn = document.getElementById("refreshBtn");
    const placeName = document.getElementById("placeName");
    const temperature = document.getElementById("temperature");
    const statusEl = document.getElementById("status");
    const waterPlace = document.getElementById("waterPlace");
    const dataTime = document.getElementById("dataTime");
    const dataType = document.getElementById("dataType");
    const message = document.getElementById("message");

    let selectedPlaceId = places[0].id;

    function getStatus(temp) {
      if (temp < 8) return "очень холодная";
      if (temp < 15) return "холодная";
      if (temp < 20) return "прохладная";
      if (temp < 24) return "комфортная";
      return "тёплая";
    }

    function formatTime(value) {
      if (!value) return "—";

      const date = new Date(value);

      return date.toLocaleString("ru-RU", {
        day: "2-digit",
        month: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function showMessage(text) {
      message.textContent = text;
      message.classList.add("show");
    }

    function hideMessage() {
      message.textContent = "";
      message.classList.remove("show");
    }

    function setLoading(place) {
      placeName.textContent = place.name;
      temperature.textContent = "…";
      statusEl.textContent = "загрузка";
      waterPlace.textContent = place.waterPlace;
      dataTime.textContent = "—";
      dataType.textContent = "—";
      hideMessage();
      refreshBtn.disabled = true;
    }

    function setError(place, text) {
      placeName.textContent = place.name;
      temperature.textContent = "—";
      statusEl.textContent = "нет данных";
      waterPlace.textContent = place.waterPlace;
      dataTime.textContent = "—";
      dataType.textContent = "—";
      showMessage(text);
    }

    function renderSelect() {
      placeSelect.innerHTML = "";

      places.forEach(place => {
        const option = document.createElement("option");
        option.value = place.id;
        option.textContent = `${place.name} — ${place.waterPlace}`;
        placeSelect.appendChild(option);
      });

      placeSelect.value = selectedPlaceId;
    }

    function findNearestValidItem(times, values) {
      const validItems = values
        .map((value, index) => ({
          value,
          time: times[index]
        }))
        .filter(item => item.value !== null && item.value !== undefined);

      if (!validItems.length) return null;

      const now = new Date();

      let nearest = validItems[0];
      let minDiff = Math.abs(new Date(nearest.time) - now);

      validItems.forEach(item => {
        const diff = Math.abs(new Date(item.time) - now);

        if (diff < minDiff) {
          minDiff = diff;
          nearest = item;
        }
      });

      return nearest;
    }

    function estimateWaterTemperatureByAir(hourly) {
      if (!hourly || !hourly.temperature_2m || !hourly.time) return null;

      const validTemps = hourly.temperature_2m
        .map((temp, index) => ({
          temp,
          time: hourly.time[index]
        }))
        .filter(item => item.temp !== null && item.temp !== undefined);

      if (!validTemps.length) return null;

      const now = new Date();
      const lastTemps = validTemps
        .filter(item => new Date(item.time) <= now)
        .slice(-24);

      const sourceTemps = lastTemps.length ? lastTemps : validTemps.slice(-24);

      const averageAirTemp =
        sourceTemps.reduce((sum, item) => sum + Number(item.temp), 0) / sourceTemps.length;

      let estimatedWaterTemp = averageAirTemp - 2;

      if (averageAirTemp > 22) {
        estimatedWaterTemp = averageAirTemp - 3;
      }

      if (averageAirTemp < 10) {
        estimatedWaterTemp = averageAirTemp - 1;
      }

      return {
        value: estimatedWaterTemp,
        time: sourceTemps[sourceTemps.length - 1].time
      };
    }

    async function fetchOpenMeteo(place, hourlyParameters) {
      const url = new URL("https://api.open-meteo.com/v1/forecast");

      url.searchParams.set("latitude", place.latitude);
      url.searchParams.set("longitude", place.longitude);
      url.searchParams.set("hourly", hourlyParameters);
      url.searchParams.set("timezone", "auto");
      url.searchParams.set("forecast_days", "1");
      url.searchParams.set("past_days", "1");

      const response = await fetch(url.toString());

      if (!response.ok) {
        throw new Error("Ошибка запроса: " + response.status);
      }

      return await response.json();
    }

    async function loadWaterTemperature() {
      const place = places.find(item => item.id === selectedPlaceId);

      if (!place) return;

      setLoading(place);

      const realWaterParameter =
        place.type === "inland"
          ? "water_temperature"
          : "sea_surface_temperature";

      try {
        let data = null;

        try {
          data = await fetchOpenMeteo(place, realWaterParameter);
        } catch (error) {
          data = null;
        }

        const times = data && data.hourly && data.hourly.time;
        const realWaterValues = data && data.hourly && data.hourly[realWaterParameter];

        if (times && realWaterValues && realWaterValues.length) {
          const nearest = findNearestValidItem(times, realWaterValues);

          if (nearest) {
            placeName.textContent = place.name;
            temperature.textContent = `${Number(nearest.value).toFixed(1)}°C`;
            statusEl.textContent = getStatus(nearest.value);
            waterPlace.textContent = place.waterPlace;
            dataTime.textContent = formatTime(nearest.time);
            dataType.textContent = "реальные";
            hideMessage();
            return;
          }
        }

        if (place.type === "inland") {
          const airData = await fetchOpenMeteo(place, "temperature_2m");
          const estimated = estimateWaterTemperatureByAir(airData.hourly);

          if (estimated) {
            placeName.textContent = place.name;
            temperature.textContent = `${Number(estimated.value).toFixed(1)}°C`;
            statusEl.textContent = getStatus(estimated.value);
            waterPlace.textContent = place.waterPlace;
            dataTime.textContent = formatTime(estimated.time);
            dataType.textContent = "оценка";

            showMessage(
              "Open-Meteo не вернул реальную температуру воды для этого водоёма. Показана приблизительная оценка по температуре воздуха за последние часы."
            );

            return;
          }
        }

        setError(
          place,
          place.type === "inland"
            ? "Для этого водоёма сейчас нет ни реальной температуры воды, ни данных для оценки по воздуху."
            : "Для этой морской точки Open-Meteo не вернул температуру поверхности воды. Попробуйте выбрать другой город."
        );
      } catch (error) {
        setError(
          place,
          "Не удалось получить данные. Проверьте интернет-соединение или попробуйте обновить позже."
        );
      } finally {
        refreshBtn.disabled = false;
      }
    }

    placeSelect.addEventListener("change", event => {
      selectedPlaceId = event.target.value;
      loadWaterTemperature();
    });

    refreshBtn.addEventListener("click", () => {
      loadWaterTemperature();
    });

    renderSelect();
    loadWaterTemperature();
  </script>
</body>
</html>
