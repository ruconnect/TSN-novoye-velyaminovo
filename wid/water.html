<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Виджет температуры воды API</title>
  <style>
    /* Стили виджета */
    .water-widget {
      width: 320px;
      padding: 24px;
      background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
      color: #ffffff;
      border-radius: 20px;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      box-sizing: border-box;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    /* Волна */
    .water-widget::before {
      content: "";
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 50px;
      background: rgba(0, 212, 255, 0.15);
      clip-path: polygon(0 60%, 25% 45%, 50% 65%, 75% 50%, 100% 70%, 100% 100%, 0% 100%);
      animation: wave 6s ease-in-out infinite alternate;
    }

    @keyframes wave {
      0% { transform: translateY(8px) scaleX(1); }
      100% { transform: translateY(-4px) scaleX(1.05); }
    }

    .widget-header {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 4px;
      color: #00d4ff;
      font-weight: bold;
    }

    .widget-location {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 20px;
      opacity: 0.9;
    }

    .widget-display {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .water-icon {
      font-size: 40px;
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-6px) rotate(3deg); }
    }

    .temp-value {
      font-size: 46px;
      font-weight: 800;
      text-shadow: 0 2px 10px rgba(0,212,255,0.3);
    }

    .air-info {
      font-size: 13px;
      margin-bottom: 15px;
      opacity: 0.74;
    }

    .widget-footer {
      font-size: 11px;
      opacity: 0.6;
      border-top: 1px solid rgba(255,255,255,0.1);
      padding-top: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .pulse-dot {
      width: 6px;
      height: 6px;
      background-color: #00ffcc;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(0.8); opacity: 0.4; box-shadow: 0 0 0 0 rgba(0,255,204,0.4); }
      50% { transform: scale(1.2); opacity: 1; box-shadow: 0 0 8px 2px rgba(0,255,204,0.7); }
      100% { transform: scale(0.8); opacity: 0.4; box-shadow: 0 0 0 0 rgba(0,255,204,0.4); }
    }

    /* Состояние загрузки */
    .loading .temp-value {
      font-size: 24px;
      opacity: 0.5;
    }
  </style>
</head>
<body>

  <!-- Разметка виджета -->
  <div class="water-widget loading" id="widget">
    <div class="widget-header">Температура воды</div>
    <div class="widget-location">Подмосковье (онлайн)</div>
    
    <div class="widget-display">
      <span class="water-icon">🌊</span>
      <div class="temp-value" id="water-temp">Загрузка...</div>
    </div>

    <div class="air-info" id="air-temp">Воздух: --°C</div>
    
    <div class="widget-footer">
      <span class="pulse-dot"></span>
      <span>API Open-Meteo • Обновлено: <span id="update-time">--:--</span></span>
    </div>
  </div>

  <!-- Скрипт работы с реальным API -->
  <script>
    // Координаты центра Московской области (Подмосковье)
    const LAT = 55.7558;
    const LON = 37.6173;

    async function fetchWaterTemperature() {
      const widget = document.getElementById('widget');
      const tempElement = document.getElementById('water-temp');
      const airElement = document.getElementById('air-temp');
      const timeElement = document.getElementById('update-time');

      try {
        // Запрос к бесплатному API погоды (текущие данные + архив за 3 дня для расчета прогрева воды)
        const url = `https://open-meteo.com{LAT}&longitude=${LON}&current=temperature_2m&hourly=temperature_2m&past_days=3&forecast_days=1`;
        
        const response = await fetch(url);
        if (!response.ok) throw new Error('Ошибка сети');
        const data = await response.json();

        // 1. Получаем текущую температуру воздуха
        const currentAirTemp = data.current.temperature_2m;

        // 2. Считаем среднесуточную температуру воздуха (учитывая инерцию прогрева воды)
        const hourlyTemps = data.hourly.temperature_2m;
        const totalHours = hourlyTemps.length;
        const sumAirTemp = hourlyTemps.reduce((sum, t) => sum + t, 0);
        const avgAirTemp = sumAirTemp / totalHours;

        /* 
          3. Эмпирическая физическая формула расчета температуры воды в средних широтах РФ:
          Вода прогревается медленнее воздуха. Ее температура сильно зависит от средней температуры 
          последних дней (75% влияния) и текущего дневного тепла (25% влияния).
        */
        let waterTemp = (avgAirTemp * 0.75) + (currentAirTemp * 0.25);

        // Корректируем пограничные значения для средних водоемов региона в летний период
        if (waterTemp < 4) waterTemp = 4.2; // Вода не замерзает летом
        if (waterTemp > 24) waterTemp = 23.8; // Выше этой планки без аномальной жары реки не греются

        // Выводим данные в интерфейс
        tempElement.textContent = `${waterTemp.toFixed(1)}°C`;
        airElement.textContent = `Воздух сейчас: ${currentAirTemp.toFixed(1)}°C`;
        
        // Ставим время обновления
        const now = new Date();
        timeElement.textContent = now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
        
        // Убираем класс загрузки
        widget.classList.remove('loading');

      } catch (error) {
        console.error('Не удалось загрузить данные:', error);
        tempElement.textContent = "Ошибка";
        airElement.textContent = "Обновите страницу";
      }
    }

    // Первичный запуск при загрузке страницы
    fetchWaterTemperature();

    // Автоматическое обновление данных с сервера каждые 15 минут (900000 мс)
    setInterval(fetchWaterTemperature, 900000);
  </script>

</body>
</html>
