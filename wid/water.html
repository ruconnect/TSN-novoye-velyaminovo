<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Виджет температуры воды</title>
    <style>
        :root {
            --bg-color: #f0f4f8;
            --card-bg: #ffffff;
            --text-main: #2c3e50;
            --text-muted: #7f8c8d;
            --accent-blue: #3498db;
            --water-blue: #1abc9c;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .water-widget {
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            padding: 24px;
            width: 300px;
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .water-widget:hover {
            transform: translateY(-5px);
        }

        .water-widget::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 8px;
            background: linear-gradient(90deg, var(--accent-blue), var(--water-blue));
        }

        .widget-header {
            margin-bottom: 20px;
        }

        .widget-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-main);
            margin: 0 0 4px 0;
        }

        .widget-subtitle {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin: 0;
        }

        .widget-display {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 20px;
        }

        .water-icon {
            font-size: 3rem;
            margin-bottom: 10px;
            animation: float 3s ease-in-out infinite;
        }

        .temp-value {
            font-size: 3.5rem;
            font-weight: 800;
            color: var(--text-main);
            line-height: 1;
            display: flex;
            align-items: flex-start;
        }

        .temp-unit {
            font-size: 1.5rem;
            font-weight: 500;
            color: var(--accent-blue);
            margin-top: 5px;
            margin-left: 2px;
        }

        .widget-footer {
            border-top: 1px solid #edf2f7;
            padding-top: 15px;
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .status-loading {
            font-style: italic;
            color: var(--text-muted);
            font-size: 1.5rem;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-6px) rotate(3deg); }
        }
    </style>
</head>
<body>

    <div class="water-widget">
        <div class="widget-header">
            <h3 class="widget-title">Водоёмы Подмосковья</h3>
            <p class="widget-subtitle" id="widget-date">Синхронизация...</p>
        </div>
        
        <div class="widget-display">
            <div class="water-icon">🌊</div>
            <div class="temp-value" id="water-temp">
                <span class="status-loading">Загрузка...</span>
            </div>
        </div>
        
        <div class="widget-footer">
            <span id="widget-location">Москва и МО</span>
            <span id="update-status">Запрос</span>
        </div>
    </div>

    <script>
        function updateDateDisplay() {
            const options = { day: 'numeric', month: 'long', hour: '2-digit', minute: '2-digit' };
            document.getElementById('widget-date').innerText = new Date().toLocaleDateString('ru-RU', options);
        }

        async function fetchWaterTemperature() {
            const tempElement = document.getElementById('water-temp');
            const statusElement = document.getElementById('update-status');
            
            // Запасной и основной эндпоинты. Если первый недоступен в РФ, скрипт автоматически переключится на зеркало
            const urls = [
                `https://open-meteo.com`,
                `https://open-meteo.com`
            ];

            let success = false;

            for (let url of urls) {
                try {
                    const response = await fetch(url, { method: 'GET', mode: 'cors' });
                    if (!response.ok) continue;
                    
                    const data = await response.json();
                    if (!data.current || data.current.soil_temperature_0_to_7cm === undefined) continue;

                    const rawTemp = data.current.soil_temperature_0_to_7cm;
                    const waterTemp = Math.round(rawTemp); 

                    tempElement.innerHTML = `${waterTemp}<span class="temp-unit">°C</span>`;
                    statusElement.innerText = "Обновлено";
                    statusElement.style.color = "#1abc9c";
                    updateDateDisplay();
                    success = true;
                    break; // Успешно вышли из цикла
                } catch (e) {
                    console.warn(`Домен ${url} недоступен, пробуем резервный...`);
                }
            }

            // Если оба API не ответили, рассчитываем температуру на основе локального времени (Offline-режим, защита от сбоев)
            if (!success) {
                console.error("Все внешние API недоступны. Включен автономный расчет.");
                const currentMonth = new Date().getMonth(); // 0 - Январь, 5 - Июнь и т.д.
                
                // Эмуляция средних исторических значений температуры воды в МО по месяцам на случай полной блокировки сети
                const mockWaterTemps = [2, 2, 3, 7, 14, 19, 22, 20, 14, 8, 4, 2];
                const localEstimatedTemp = mockWaterTemps[currentMonth];

                tempElement.innerHTML = `${localEstimatedTemp}<span class="temp-unit">°C*</span>`;
                statusElement.innerText = "Автономно";
                statusElement.style.color = "#f39c12";
                updateDateDisplay();
            }
        }

        // Запуск
        fetchWaterTemperature();
        // Обновление раз в 15 минут
        setInterval(fetchWaterTemperature, 900000);
    </script>
</body>
</html>
