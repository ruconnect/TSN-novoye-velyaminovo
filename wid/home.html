<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление освещением по этажам</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --border-color: #e0e0e0;
            --text-color: #333333;
            --light-on: #ffeaa7;
            --light-off: #dfe6e9;
            --accent: #0984e3;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .widget-container {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            padding: 20px;
            max-width: 900px;
            width: 100%;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .floor-selector button {
            background: var(--light-off);
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s ease;
        }

        .floor-selector button.active {
            background: var(--accent);
            color: white;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }

        /* Сетка для плана дома */
        .house-map {
            position: relative;
            background: #fafafa;
            border: 3px solid #636e72;
            border-radius: 8px;
            height: 450px;
            overflow: hidden;
        }

        .room {
            position: absolute;
            border: 2px solid #b2bec3;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: background-color 0.3s ease;
            font-size: 14px;
            font-weight: 500;
            text-align: center;
            padding: 5px;
        }

        .room:hover {
            filter: brightness(0.95);
        }

        .room .status-icon {
            font-size: 20px;
            margin-top: 5px;
        }

        /* Список комнат с тумблерами */
        .controls-panel {
            background: #f9f9f9;
            border-radius: 8px;
            padding: 15px;
            border: 1px solid var(--border-color);
        }

        .control-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .control-item:last-child {
            border-bottom: none;
        }

        /* Стили тумблера */
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #2ecc71;
        }

        input:checked + .slider:before {
            transform: translateX(24px);
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

<div class="widget-container">
    <div class="header">
        <h2>Управление домом</h2>
        <div class="floor-selector">
            <button id="btn-floor1" class="active" onclick="switchFloor(1)">1 Этаж</button>
            <button id="btn-floor2" onclick="switchFloor(2)">2 Этаж</button>
        </div>
    </div>

    <div class="main-layout">
        <!-- Интерактивная карта -->
        <div class="house-map" id="house-map">
            <!-- Комнаты генерируются динамически через JS -->
        </div>

        <!-- Панель управления -->
        <div class="controls-panel">
            <h3>Список комнат</h3>
            <div id="controls-list">
                <!-- Тумблеры генерируются динамически через JS -->
            </div>
        </div>
    </div>
</div>

<script>
    // Данные комнат (1 этаж по фото, 2 этаж — свободная планировка)
    const houseData = {
        1: [
            { id: 'f1_r1', name: 'Левая верхняя комната', top: '0%', left: '0%', width: '40%', height: '35%', light: false },
            { id: 'f1_r2', name: 'Терраса (Зеленая зона)', top: '0%', left: '40%', width: '60%', height: '35%', light: false },
            { id: 'f1_r3', name: 'Гостиная / Зал', top: '35%', left: '0%', width: '40%', height: '45%', light: true },
            { id: 'f1_r4', name: 'Большая правая комната', top: '35%', left: '40%', width: '60%', height: '45%', light: false },
            { id: 'f1_r5', name: 'Нижний левый коридор', top: '80%', left: '0%', width: '40%', height: '20%', light: false },
            { id: 'f1_r6', name: 'Нижний правый блок', top: '80%', left: '40%', width: '60%', height: '20%', light: false }
        ],
        2: [
            { id: 'f2_r1', name: 'Главная спальня', top: '0%', left: '0%', width: '50%', height: '50%', light: false },
            { id: 'f2_r2', name: 'Детская комната', top: '0%', left: '50%', width: '50%', height: '50%', light: false },
            { id: 'f2_r3', name: 'Холл / Лестница', top: '50%', left: '0%', width: '40%', height: '50%', light: true },
            { id: 'f2_r4', name: 'Ванная комната', top: '50%', left: '40%', width: '30%', height: '50%', light: false },
            { id: 'f2_r5', name: 'Гардеробная', top: '50%', left: '70%', width: '30%', height: '50%', light: false }
        ]
    };

    let currentFloor = 1;

    function renderWidget() {
        const mapContainer = document.getElementById('house-map');
        const listContainer = document.getElementById('controls-list');
        
        mapContainer.innerHTML = '';
        listContainer.innerHTML = '';

        const rooms = houseData[currentFloor];

        rooms.forEach(room => {
            // 1. Создаем визуальную комнату на карте
            const roomEl = document.createElement('div');
            roomEl.className = 'room';
            roomEl.style.top = room.top;
            roomEl.style.left = room.left;
            roomEl.style.width = room.width;
            roomEl.style.height = room.height;
            roomEl.style.backgroundColor = room.light ? 'var(--light-on)' : 'var(--light-off)';
            
            roomEl.innerHTML = `
                <div>${room.name}</div>
                <div class="status-icon">${room.light ? '💡' : '⚫'}</div>
            `;
            
            // Клик по комнате на карте меняет свет
            roomEl.onclick = () => toggleLight(room.id);
            mapContainer.appendChild(roomEl);

            // 2. Создаем строку управления с тумблером
            const controlItem = document.createElement('div');
            controlItem.className = 'control-item';
            controlItem.innerHTML = `
                <span>${room.name}</span>
                <label class="switch">
                    <input type="checkbox" ${room.light ? 'checked' : ''} onchange="toggleLight('${room.id}')">
                    <span class="slider"></span>
                </label>
            `;
            listContainer.appendChild(controlItem);
        });
    }

    function toggleLight(roomId) {
        const room = houseData[currentFloor].find(r => r.id === roomId);
        if (room) {
            room.light = !room.light;
            renderWidget();
        }
    }

    function switchFloor(floorNum) {
        currentFloor = floorNum;
        
        // Обновляем активные классы кнопок
        document.getElementById('btn-floor1').classList.toggle('active', floorNum === 1);
        document.getElementById('btn-floor2').classList.toggle('active', floorNum === 2);
        
        renderWidget();
    }

    // Инициализация при загрузке
    renderWidget();
</script>

</body>
</html>
