<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление освещением дома</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 200px;
            background-color: #000000; /* Чёрный цвет фона */
            margin: 0;
        }
        .widget-container {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 600px;
        }
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .btn-floor {
            padding: 10px 20px;
            font-size: 16px;
            border: 2px solid #007bff;
            background: white;
            color: #007bff;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-floor.active {
            background: #007bff;
            color: white;
        }
        .house-map {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            background: #e9ecef;
            padding: 15px;
            border-radius: 8px;
            min-height: 300px;
        }
        .room {
            background: #e0e0e0;
            border: 2px solid #bdc3c7;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
            position: relative;
            padding: 20px;
        }
        .room.light-on {
            background: #fff3cd;
            border-color: #ffc107;
            color: #856404;
            box-shadow: 0 0 10px rgba(255, 193, 7, 0.5);
        }
        .room .status {
            font-size: 12px;
            margin-top: 5px;
            font-weight: normal;
        }
        /* Специфическая сетка для 1 этажа по фото */
        .floor-1 .room-1 { grid-column: 1; grid-row: 1 / 3; }
        .floor-1 .room-2 { grid-column: 2 / 4; grid-row: 1; background: #d4edda; border-color: #c3e6cb; cursor: default; } /* Терраса/Двор */
        .floor-1 .room-3 { grid-column: 2 / 4; grid-row: 2; }
        .floor-1 .room-4 { grid-column: 1; grid-row: 3; }
        .floor-1 .room-5 { grid-column: 2; grid-row: 3; }
        .floor-1 .room-6 { grid-column: 3; grid-row: 3; }

        /* Сетка для 2 этажа (Мансарда / Спальни) */
        .floor-2 .room-7 { grid-column: 1 / 3; grid-row: 1; }
        .floor-2 .room-8 { grid-column: 3; grid-row: 1; }
        .floor-2 .room-9 { grid-column: 1; grid-row: 2 / 4; }
        .floor-2 .room-10 { grid-column: 2 / 4; grid-row: 2; }
        .floor-2 .room-11 { grid-column: 2 / 4; grid-row: 3; }
    </style>
</head>
<body>

<div class="widget-container">
    <div class="controls">
        <h2>Мониторинг дома</h2>
        <div>
            <button class="btn-floor active" onclick="switchFloor(1)">1 Этаж</button>
            <button class="btn-floor" onclick="switchFloor(2)">2 Этаж</button>
        </div>
    </div>

    <!-- Карта комнат -->
    <div id="houseMap" class="house-map floor-1">
        <!-- Комнаты генерируются через JavaScript -->
    </div>
</div>

<script>
    // Состояние света в комнатах (true - включен, false - выключен)
    // 1 этаж: 1-6 (комната 2 — открытая зеленая зона с фото, без света)
    // 2 этаж: 7-11
    const lightState = {
        1: false, 2: null, 3: true, 4: false, 5: true, 6: false,
        7: false, 8: false, 9: true, 10: false, 11: false
    };

    // Структура комнат для каждого этажа
    const floors = {
        1: [
            { id: 1, name: "Комната 1" },
            { id: 2, name: "Зона 2 (Улица)", "isOutdoor": true },
            { id: 3, name: "Комната 3" },
            { id: 4, name: "Комната 4" },
            { id: 5, name: "Комната 5" },
            { id: 6, name: "Комната 6" }
        ],
        2: [
            { id: 7, name: "Комната 7" },
            { id: 8, name: "Комната 8" },
            { id: 9, name: "Комната 9" },
            { id: 10, name: "Комната 10" },
            { id: 11, name: "Комната 11" }
        ]
    };

    let currentFloor = 1;

    function renderFloor(floorNum) {
        const mapContainer = document.getElementById('houseMap');
        mapContainer.innerHTML = '';
        mapContainer.className = `house-map floor-${floorNum}`;

        floors[floorNum].forEach(room => {
            const roomDiv = document.createElement('div');
            roomDiv.classList.add('room', `room-${room.id}`);
            
            if (room.isOutdoor) {
                roomDiv.innerHTML = `<div>${room.id}</div><div class="status">Улица</div>`;
                mapContainer.appendChild(roomDiv);
                return;
            }

            // Установка начального состояния света
            if (lightState[room.id]) {
                roomDiv.classList.add('light-on');
            }

            roomDiv.innerHTML = `
                <div>${room.id}</div>
                <div class="status" id="status-${room.id}">
                    ${lightState[room.id] ? '💡 Свет вкл.' : '• Выкл.'}
                </div>
            `;

            // Клик для переключения света
            roomDiv.onclick = () => toggleLight(room.id, roomDiv);
            mapContainer.appendChild(roomDiv);
        });
    }

    function toggleLight(roomId, roomElement) {
        lightState[roomId] = !lightState[roomId];
        const statusText = document.getElementById(`status-${roomId}`);
        
        if (lightState[roomId]) {
            roomElement.classList.add('light-on');
            statusText.innerText = '💡 Свет вкл.';
        } else {
            roomElement.classList.remove('light-on');
            statusText.innerText = '• Выкл.';
        }
    }

    function switchFloor(floorNum) {
        currentFloor = floorNum;
        
        // Обновление кнопок
        document.querySelectorAll('.btn-floor').forEach((btn, index) => {
            btn.classList.toggle('active', index + 1 === floorNum);
        });

        renderFloor(floorNum);
    }

    // Инициализация при загрузке
    renderFloor(1);
</script>

</body>
</html>
