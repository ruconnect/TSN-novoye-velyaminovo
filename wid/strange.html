<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ретро счётчик</title>
    <style>
        body {
            background-color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* Контейнер всего счётчика */
        .retro-counter {
            display: flex;
            background: linear-gradient(145deg, #151515, #333333);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 
                inset 0 2px 5px rgba(255,255,255,0.1),
                0 10px 25px rgba(0,0,0,0.8),
                0 0 0 4px #444;
            border: 2px solid #111;
        }

        /* Стили для каждого из 6 кубиков */
        .digit-cube {
            position: relative;
            width: 60px;
            height: 90px;
            background: linear-gradient(to bottom, #111 0%, #222 49%, #000 51%, #111 100%);
            margin: 0 4px;
            border-radius: 6px;
            border: 1px solid #000;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.9), 0 4px 6px rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Текст цифры */
        .digit-cube span {
            font-family: 'Courier New', Courier, monospace;
            font-size: 65px;
            font-weight: bold;
            color: #ff5500;
            text-shadow: 0px 2px 4px rgba(0, 0, 0, 0.8), 0 0 10px rgba(255,255,255,0.1);
            letter-spacing: -2px;
        }

        /* Горизонтальная ретро-полоса разделения (эффект перекидного табло) */
        .digit-cube::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 2px;
            background: rgba(0, 0, 0, 0.7);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Блик для объема */
        .digit-cube::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 50%;
            background: linear-gradient(to bottom, rgba(255,255,255,0.08), rgba(255,255,255,0));
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- Виджет из 6 кубиков -->
    <div class="retro-counter">
        <div class="digit-cube"><span id="d1">0</span></div>
        <div class="digit-cube"><span id="d2">0</span></div>
        <div class="digit-cube"><span id="d3">1</span></div>
        <div class="digit-cube"><span id="d4">9</span></div>
        <div class="digit-cube"><span id="d5">8</span></div>
        <div class="digit-cube"><span id="d6">4</span></div>
    </div>

</body>
</html>
