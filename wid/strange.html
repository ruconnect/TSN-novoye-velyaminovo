<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mechanical Bicycle Speedometer</title>
    <style>
        body {
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Arial', sans-serif;
            user-select: none;
        }

        .speedometer-widget {
            width: 380px;
            height: 380px;
            position: relative;
            filter: drop-shadow(0 15px 25px rgba(0,0,0,0.8));
        }

        /* Механический одометр в стиле крутящихся барабанов */
        .odometer-container {
            position: absolute;
            bottom: 95px;
            left: 50%;
            transform: translateX(-50%);
            background: #080808;
            border: 2px solid #2d2d2d;
            border-radius: 4px;
            display: flex;
            padding: 3px 4px;
            box-shadow: inset 0 8px 8px rgba(0,0,0,0.9), 0 1px 1px rgba(255,255,255,0.1);
            z-index: 5;
        }

        .drum-window {
            width: 18px;
            height: 26px;
            overflow: hidden;
            position: relative;
            margin: 0 1px;
            background: #f5f5f5;
            border-radius: 2px;
            box-shadow: inset 0 4px 6px rgba(0,0,0,0.3), inset 0 -4px 6px rgba(0,0,0,0.3);
        }

        /* Последний барабан для долей километров (черный с белыми цифрами) */
        .drum-window.fraction {
            background: #111;
        }

        .drum-strip {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .drum-digit {
            height: 26px;
            line-height: 26px;
            text-align: center;
            font-size: 20px;
            font-weight: 900;
            font-family: 'Courier New', monospace;
            color: #000;
        }

        .drum-window.fraction .drum-digit {
            color: #fff;
        }

        /* Слой стеклянного блика поверх прибора */
        .glass-glare {
            position: absolute;
            top: 15px;
            left: 15px;
            width: 350px;
            height: 350px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0.02) 40%, rgba(255,255,255,0) 60%);
            pointer-events: none;
            z-index: 20;
        }

        /* Анимация плавного хода стрелки */
        #needle {
            transition: transform 0.6s cubic-bezier(0.1, 0.8, 0.3, 1);
        }
    </style>
</head>
<body>

    <div class="speedometer-widget">
        <!-- Блик на стекле -->
        <div class="glass-glare"></div>

        <!-- SVG Циферблат -->
        <svg width="380" height="380" viewBox="0 0 400 400" xmlns="http://w3.org">
            <defs>
                <!-- Хромированный ободок -->
                <linearGradient id="chrome" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#f0f0f0"/>
                    <stop offset="20%" stop-color="#7a7a7a"/>
                    <stop offset="45%" stop-color="#fff"/>
                    <stop offset="50%" stop-color="#3a3a3a"/>
                    <stop offset="75%" stop-color="#cccccc"/>
                    <stop offset="100%" stop-color="#1a1a1a"/>
                </linearGradient>
                <!-- Объем подложки -->
                <radialGradient id="dial-bg" cx="50%" cy="50%" r="50%" fx="50%" fy="30%">
                    <stop offset="0%" stop-color="#1c1d1f"/>
                    <stop offset="75%" stop-color="#0a0b0c"/>
                    <stop offset="100%" stop-color="#000000"/>
                </radialGradient>
                <!-- Металлическая ступица стрелки -->
                <radialGradient id="hub-grad" cx="50%" cy="50%" r="50%">
                    <stop offset="0%" stop-color="#555"/>
                    <stop offset="60%" stop-color="#181818"/>
                    <stop offset="100%" stop-color="#050505"/>
                </radialGradient>
                <!-- Тень от стрелки -->
                <filter id="shadow" x="-20%" y="-20%" width="150%" height="150%">
                    <feDropShadow dx="2" dy="5" stdDeviation="4" flood-color="#000" flood-opacity="0.6"/>
                </filter>
            </defs>

            <!-- Внешнее хромированное кольцо корпуса -->
            <circle cx="200" cy="200" r="185" fill="url(#chrome)" />
            <circle cx="200" cy="200" r="170" fill="#0d0d0d" />
            <circle cx="200" cy="200" r="166" fill="url(#dial-bg)" />

            <!-- Зеленая радиальная полоса шкалы скорости -->
            <path d="M 95 305 A 130 130 0 1 1 305 305" fill="none" stroke="#1d6f28" stroke-width="5" stroke-linecap="round"/>
            <!-- Внутренний пунктир RPM -->
            <path d="M 125 270 A 90 90 0 1 1 290 255" fill="none" stroke="#333" stroke-width="2" stroke-dasharray="2,5"/>

            <!-- Разметка шкалы КМ/Ч (Засечки) -->
            <!-- 0 -->   <line x1="95" y1="305" x2="105" y2="295" stroke="#e62424" stroke-width="4"/>
            <!-- 10 -->  <line x1="68" y1="210" x2="80" y2="210" stroke="#fff" stroke-width="3"/>
            <!-- 20 -->  <line x1="120" y1="100" x2="127" y2="112" stroke="#fff" stroke-width="3"/>
            <!-- 30 -->  <line x1="280" y1="100" x2="273" y2="112" stroke="#fff" stroke-width="3"/>
            <!-- 40 -->  <line x1="332" y1="210" x2="320" y2="210" stroke="#fff" stroke-width="3"/>
            <!-- 50 -->  <line x1="305" y1="305" x2="295" y2="295" stroke="#e62424" stroke-width="4"/>

            <!-- Мелкие промежуточные насечки шкалы скорости -->
            <path d="M 95 305 A 130 130 0 0 1 305 305" fill="none" stroke="#fff" stroke-width="2" stroke-dasharray="2,14" stroke-dashoffset="5"/>

            <!-- Текстовые подписи шкал (шрифты подогнаны под фото) -->
            <g font-family="Arial Black, Impact, sans-serif" font-weight="bold" text-anchor="middle" fill="#fff">
                <!-- Главные цифры скорости -->
                <text x="85" y="325" font-size="24" fill="#e62424">0</text>
                <text x="50" y="218" font-size="24">10</text>
                <text x="115" y="95" font-size="24">20</text>
                <text x="285" y="95" font-size="24">30</text>
                <text x="350" y="218" font-size="24">40</text>
                <text x="320" y="325" font-size="24" fill="#e62424">50</text>
            </g>

            <g font-family="Arial, sans-serif" font-weight="bold" text-anchor="middle" fill="#7a7b7d" font-size="12">
                <!-- Внутренняя шкала оборотов RPM -->
                <text x="145" y="140">100</text>
                <text x="200" y="105">200</text>
                <text x="255" y="140">300</text>
                <text x="275" y="200">400 -</text>
                <text x="235" y="322">600</text>
            </g>

            <!-- Текстовые логотипы на приборе -->
            <text x="200" y="165" font-family="Arial Black, sans-serif" font-size="15" font-weight="900" fill="#fff" letter-spacing="3" text-anchor="middle">SPORTS</text>
            <text x="120" y="245" font-family="Arial, sans-serif" font-size="21" font-weight="900" font-style="italic" fill="#8d8e92" text-anchor="middle">km/h</text>
            <text x="270" y="282" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#8d8e92" text-anchor="middle">RPM</text>

            <!-- Механическая красная стрелка -->
            <!-- Точка вращения находится ровно по центру SVG (200, 200) -->
            <g id="needle" filter="url(#shadow)" transform="rotate(-125, 200, 200)">
                <!-- Задний противовес стрелки -->
                <path d="M 200 203 L 150 201 L 150 199 L 200 197 Z" fill="#e62424" />
                <!-- Основной указатель -->
                <path d="M 200 197 L 335 199 L 335 201 L 200 203 Z" fill="#e62424" />
            </g>

            <!-- Центральный металлический колпачок (ступица) оси -->
            <circle cx="200" cy="200" r="24" fill="url(#hub-grad)" stroke="#1a1a1a" stroke-width="2"/>
            <circle cx="200" cy="200" r="23" fill="none" stroke="#444" stroke-width="1"/>
        </svg>

        <!-- Одометр (Пробег) вынесен в HTML слой ради красивой 3D анимации прокрутки барабанов -->
        <div class="odometer-container" id="odometer">
            <div class="drum-window"><div class="drum-strip" id="drum-0"></div></div>
            <div class="drum-window"><div class="drum-strip" id="drum-1"></div></div>
            <div class="drum-window"><div class="drum-strip" id="drum-2"></div></div>
            <div class="drum-window"><div class="drum-strip" id="drum-3"></div></div>
            <div class="drum-window fraction"><div class="drum-strip" id="drum-4"></div></div>
        </div>
    </div>

    <script>
        // ==========================================================
        // НАСТРОЙКА ВЫВОДИМЫХ ДАННЫХ (УКАЖИТЕ СВОИ ЗНАЧЕНИЯ ЗДЕСЬ)
        // ==========================================================
        const CURRENT_SPEED = 28;     // Текущая скорость: от 0 до 50 км/ч
        const CURRENT_MILEAGE = 84.3; // Текущий пробег: число с десятыми (например, 84.3)
        // ==========================================================

        // Генерация лент цифр (0-9) для каждого барабана
        function initOdometer() {
            const digits =;
            const html = digits.map(d => `<div class="drum-digit">${d}</div>`).join('');
            for(let i = 0; i < 5; i++) {
                document.getElementById(`drum-${i}`).innerHTML = html;
            }
        }
