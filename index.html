<style>
:root {
    --bg-color: #e0f7fa; /* светлый фон */
    --card-bg: #ffffff;
    --btn-color: #039be5; /* голубой цвет для кнопок */
    --btn-hover: #0288d1;
    --text-main: #01579b;
    --font-family: 'Arial', sans-serif;
    --radius: 16px;
    --shadow: none; /* убираем тень для макета фото */
    --gap: 20px;
}

/* Общий стиль */
body {
    margin: 0;
    padding: 30px 20px;
    font-family: var(--font-family);
    background-color: var(--bg-color);
    text-align: center; /* Центрирование текста по умолчанию */
    color: var(--text-main);
}

h1 {
    font-size: 2rem;
    margin-bottom: 20px;
}

.container {
    max-width: 1200px;
    margin: 0 auto;
}

/* Основная сетка */
.main {
    display: grid;
    grid-template-columns: 1fr;
    gap: var(--gap);
}

@media(min-width: 992px) {
    .main {
        grid-template-columns: 2fr 1fr;
    }
}

/* Карточки */
.card {
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 20px;
    margin: 0 auto; /* по центру */
    max-width: 500px;
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* Заголовки */
h2 {
    font-size: 1.2rem;
    margin-bottom: 15px;
    border-bottom: 2px solid #ccc;
    padding-bottom: 8px;
    width: 100%;
    text-align: center;
}

/* Кнопки - большие, светлые, округлые */
.btn {
    display: block;
    width: 100%;
    padding: 15px 30px;
    margin: 10px 0;
    border: none;
    border-radius: 25px;
    font-size: 1.2rem;
    font-weight: 600;
    color: #fff;
    background-color: var(--btn-color);
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: none; /* убираем тень для простоты */
}

.btn:hover {
    background-color: var(--btn-hover);
    transform: translateY(-2px);
}

/* Варианты кнопок */
.btn-outline {
    background: transparent;
    border: 2px solid var(--btn-color);
    color: var(--btn-color);
}

.btn-success {
    background-color: #4caf50;
}

.btn-success:hover {
    background-color: #388e3c;
}
</style>
