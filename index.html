<meta charset="UTF-8" />

<title>Стиль экранов Android</title>

<style>
:root {
    --bg-color: #e3f2fd;
    --card-bg: #ffffff;
    --text-main: #263238;
    --text-muted: #546e7a;
    --primary: #2196f3;
    --primary-hover: #1976d2;
    --light: #90caf9;
    --dark: #0d47a1;
    --radius: 16px;
    --shadow: 0 8px 16px rgba(0,0,0,0.2);
    --font-family: 'Arial', sans-serif;
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: var(--font-family);
    background-color: var(--bg-color);
    padding: 20px;
    color: var(--text-main);
}

h1 {
    text-align: center;
    font-size: 2rem;
    margin-bottom: 20px;
    color: var(--dark);
}

.main-layout {
    display: grid;
    grid-template-columns: 1fr;
    gap: 20px;
}

@media (min-width: 992px) {
    .main-layout {
        grid-template-columns: 2fr 1fr;
    }
}

/* Карточки по стилю */
.card {
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* Заголовки секций */
.card h2 {
    margin-bottom: 12px;
    font-size: 1.2rem;
    color: var(--dark);
    border-bottom: 2px solid #cfd8dc;
    padding-bottom: 8px;
    width: 100%;
    text-align: center;
}

/* Кнопки в стиле Android */
.btn {
    padding: 14px 24px;
    margin: 8px;
    border: none;
    border-radius: 12px;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.3s ease;
    display: inline-block;
    min-width: 200px;
    text-align: center;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
}

.btn-primary {
    background-color: var(--primary);
    color: #fff;
}
.btn-primary:hover {
    background-color: var(--primary-hover);
}
.btn-success {
    background-color: #4caf50;
    color: #fff;
}
.btn-success:hover {
    background-color: #388e3c;
}
.btn-outline {
    background-color: transparent;
    border: 2px solid #90caf9;
    color: var(--text-main);
}
.btn-outline:hover {
    background-color: #e3f2fd;
}
.btn-accent {
    background-color: #ff9800;
    color: #fff;
}
.btn-accent:hover {
    background-color: #fb8c00;
}
.btn-dark {
    background-color: #212121;
    color: #fff;
}
.btn-dark:hover {
    background-color: #000;
}

/* Внутренние блоки и стили */
.widgets-section {
    display: flex;
    flex-direction: column;
    gap: 15px;
    width: 100%;
}

.iframe-wrapper {
    background: #f3f3f3;
    border-radius: var(--radius);
    box-shadow: 0 4px 8px rgba(0,0,0,0.15);
    padding: 10px;
}

h3 {
    text-align: center;
    font-size: 1rem;
    margin-bottom: 10px;
    color: var(--text-muted);
}

/* Инлайн стилиция для iframe */
iframe {
    width: 100%;
    height: 400px;
    border-radius: 12px;
    border: none;
}

</style>
