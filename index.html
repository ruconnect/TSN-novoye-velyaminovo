<style>
:root {
    --bg-color: #d0e2f1; /* светлый фон */
    --card-bg: #ffffff;
    --btn-color: #2196f3; /* базовый цвет */
    --btn-hover: #1976d2;
    --text-main: #12324f; /* темный цвет для текста */
    --font-family: 'Arial', sans-serif;
    --radius: 20px;
    --shadow: 0 8px 16px rgba(0,0,0,0.2);
}

body {
    font-family: var(--font-family);
    background-color: var(--bg-color);
    margin: 0;
    padding: 30px 20px;
    color: var(--text-main);
}

h1 {
    text-align: center;
    font-size: 2rem;
    margin-bottom: 20px;
    color: var(--text-main);
}

.container {
    max-width: 1200px;
    margin: 0 auto;
}

/* Основная разметка: два столбца на больших экранах, один - на маленьких */
.main {
    display: grid;
    grid-template-columns: 1fr;
    gap: 20px;
}

@media(min-width: 992px) {
    .main {
        grid-template-columns: 2fr 1fr;
    }
}

/* Карточки с кнопками */
.card {
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: var(--shadow);
}

h2 {
    font-size: 1.2rem;
    margin-bottom: 15px;
    border-bottom: 2px solid #ececec;
    padding-bottom: 8px;
}

/* Стиль кнопок */
.btn {
    display: block;
    width: 100%;
    margin: 10px 0;
    padding: 14px;
    border: none;
    border-radius: var(--radius);
    background-color: var(--btn-color);
    color: #fff;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    text-align: center;
    text-decoration: none;
}

.btn:hover {
    background-color: var(--btn-hover);
    transform: translateY(-2px);
    box-shadow: 0 8px 16px rgba(0,0,0,0.2);
}

/* Варианты кнопок */
.btn-outline {
    background: transparent;
    border: 2px solid #2196f3;
    color: #2196f3;
}
.btn-outline:hover {
    background: #e3f2fd;
}

/* Контейнер для виджета и iframe */
.widget {
    margin-top: 20px;
}

.widget h3 {
    text-align: center;
    margin-bottom: 10px;
    font-size: 1rem;
    color: #12324f;
}

/* Ифреймы в стиле Android: округлые края, теневые рамки */
iframe {
    width: 100%;
    height: 300px;
    border-radius: 20px;
    border: none;
    box-shadow: var(--shadow);
}

</style>
</head>
