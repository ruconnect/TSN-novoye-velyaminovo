<h1 style="text-align: center;">Посетите этот сайт!</h1>
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Финал</title>
    <style>
        /* Стилизуем ссылку как кнопку */
        .yellow-hover-btn {
            display: inline-block;
            padding: 12px 24px;
            background-color: #3498db; /* Базовый синий цвет */
            color: #ffffff; /* Белый цвет текста */
            text-decoration: none; /* Убираем подчеркивание у ссылки */
            border-radius: 5px; /* Скругленные углы */
            font-family: Arial, sans-serif;
            font-size: 16px;
            font-weight: bold;
            transition: background-color 0.3s ease; /* Плавный переход цвета */
            border: none;
            cursor: pointer;
        }

        /* Эффект при наведении курсора */
        .yellow-hover-btn:hover {
            background-color: #f1c40f; /* Желтый цвет */
            color: #000000; /* Меняем текст на черный для читаемости */
        }
    </style>
</head>
<body>

    <!-- Переход на другую страницу осуществляется с помощью атрибута href -->
    <a href="https://ruconnect.github.io/TSN-novoye-velyaminovo/" class="yellow-hover-btn">
        Перейти на страницу
    </a>

</body>
</html>
