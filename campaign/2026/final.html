<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Финал</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Roboto', 'Segoe UI', -apple-system, sans-serif;
            background-color: #2196F3; /* Фирменный синий фон Android */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }

        /* Окно мастера настройки Android Setup Wizard */
        .setup-window {
            background-color: #ffffff;
            width: 100%;
            max-width: 400px;
            height: 600px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
            position: relative;
        }

        /* Синяя однотонная шапка */
        .setup-header {
            background-color: #2196F3;
            color: #ffffff;
            padding: 40px 24px 24px 24px;
            flex-shrink: 0;
        }

        .setup-header h1 {
            font-size: 1.5rem;
            font-weight: 400;
        }

        /* Контентная зона */
        .setup-content {
            padding: 32px 24px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .info-text {
            font-size: 1rem;
            color: #212121;
            line-height: 1.5;
        }

        /* Тонкий разделитель в стиле разделов Android */
        .divider {
            height: 1px;
            background-color: #e0e0e0;
            width: 100%;
            margin-top: 8px;
        }

        /* Нижний статус-бар мастера с кнопками навигации */
        .setup-footer {
            border-top: 1px solid #e0e0e0;
            padding: 8px 16px;
            display: flex;
            justify-content: flex-end; /* Сдвигаем кнопку подтверждения вправо */
            background-color: #ffffff;
            flex-shrink: 0;
        }

        /* Фирменная плоская кнопка Material Design вместо желтой при наведении */
        .yellow-hover-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: none;
            border: none;
            color: #2196F3; /* Акцентный синий цвет */
            font-size: 0.875rem;
            font-weight: 500;
            text-transform: uppercase;
            padding: 8px 16px;
            cursor: pointer;
            border-radius: 2px;
            transition: background-color 0.2s;
            text-decoration: none;
        }

        /* Легкий серый оверлей при наведении по гайдлайнам Material */
        .yellow-hover-btn:hover {
            background-color: rgba(33, 150, 243, 0.04);
            color: #2196F3;
        }
    </style>
</head>
<body>

    <div class="setup-window">
        <!-- Шапка -->
        <div class="setup-header">
            <h1>Посетите этот сайт!</h1>
        </div>

        <!-- Основная часть экрана -->
        <div class="setup-content">
            <p class="info-text">
                Проверка кода успешно завершена. Для продолжения работы и перехода к сервисам ТСН Новое Вельяминово нажмите кнопку ниже.
            </p>
            <div class="divider"></div>
        </div>

        <!-- Нижняя панель с кнопкой перехода -->
        <div class="setup-footer">
            <a href="https://velyminovo.vercel.app" class="yellow-hover-btn">
                Перейти на страницу
            </a>
        </div>
    </div>

</body>
</html>
